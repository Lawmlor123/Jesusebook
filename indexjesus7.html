<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chapter 7 – Baptism in the Jordan</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sky-top: #041626;
      --sky-mid: #0b2f44;
      --sky-bottom: #164d63;
      --accent: #a2e7ff;
      --accent-glow: rgba(162, 231, 255, 0.4);
      --card-bg: rgba(8, 19, 28, 0.92);
      --text-primary: #f7f3e8;
      --text-soft: #d2ebff;
      --water-top: #4fc0de;
      --water-mid: #1f6a84;
      --water-deep: #0a3f52;
      --radius-lg: 22px;
      --radius-md: 16px;
      --transition-smooth: 0.9s cubic-bezier(0.45, 0.05, 0.2, 0.95);
      font-family: "Nunito", "Segoe UI", system-ui, sans-serif;
      color-scheme: only light;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 40%, var(--sky-bottom) 100%);
      color: var(--text-primary);
    }

    main {
      width: min(96vw, 700px);
      max-height: 96vh;
      overflow-y: auto;
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: clamp(14px, 3vw, 28px);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.55);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ───── Header ───── */
    header { text-align: center; }
    header h1 {
      font-size: clamp(1.3rem, 3.5vw, 1.8rem);
      font-weight: 800;
      color: #b6f6ff;
      letter-spacing: -0.02em;
    }
    header p {
      margin-top: 6px;
      max-width: 34rem;
      margin-inline: auto;
      color: var(--text-soft);
      line-height: 1.45;
      font-size: clamp(0.8rem, 2vw, 0.95rem);
    }

    /* ───── Scene ───── */
    .scene {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      min-height: 220px;
      max-height: 380px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: linear-gradient(180deg, #7cd2ff 0%, #b2ecff 32%, #a8d9ff 34%, #2d8db5 50%, #15586d 100%);
      box-shadow: inset 0 -25px 55px rgba(0, 0, 0, 0.5);
    }

    /* ── Sun ── */
    .sun {
      position: absolute;
      top: 6%;
      left: 10%;
      width: 85px;
      height: 85px;
      border-radius: 50%;
      background: radial-gradient(circle, #fffce0 0%, #ffe480 55%, transparent);
      box-shadow: 0 0 60px rgba(255, 228, 128, 0.8);
      animation: sun-pulse 4s ease-in-out infinite alternate;
    }
    @keyframes sun-pulse {
      0%   { box-shadow: 0 0 60px rgba(255, 228, 128, 0.8); }
      100% { box-shadow: 0 0 90px rgba(255, 228, 128, 0.95); }
    }

    /* ── Dove ── */
    .dove {
      position: absolute;
      top: 10%;
      right: 15%;
      width: 16px;
      height: 16px;
      background: #fffdf5;
      border-radius: 50%;
      filter: drop-shadow(0 0 14px rgba(255, 255, 255, 0.85));
      opacity: 0;
      transform: translateY(-30px) scale(0.6);
      transition: opacity 0.8s ease, transform 1s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .dove::before,
    .dove::after {
      content: "";
      position: absolute;
      top: 2px;
      width: 40px;
      height: 14px;
      border-radius: 50%;
      background: #fffdf5;
    }
    .dove::before {
      left: -36px;
      transform: rotate(-14deg);
      transform-origin: right center;
      animation: none;
    }
    .dove::after {
      right: -36px;
      transform: rotate(14deg);
      transform-origin: left center;
      animation: none;
    }
    .dove.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .dove.show::before { animation: wing-flap-left 0.7s ease-in-out infinite alternate; }
    .dove.show::after  { animation: wing-flap-right 0.7s ease-in-out infinite alternate; }

    @keyframes wing-flap-left {
      0%   { transform: rotate(-14deg); }
      100% { transform: rotate(-28deg); }
    }
    @keyframes wing-flap-right {
      0%   { transform: rotate(14deg); }
      100% { transform: rotate(28deg); }
    }

    /* ── Heavenly light beam (step 3) ── */
    .heaven-light {
      position: absolute;
      top: 0;
      right: 12%;
      width: 120px;
      height: 60%;
      background: linear-gradient(180deg, rgba(255,255,230,0.35) 0%, rgba(255,255,230,0.08) 60%, transparent 100%);
      clip-path: polygon(35% 0%, 65% 0%, 100% 100%, 0% 100%);
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: none;
    }
    .heaven-light.show { opacity: 1; }

    /* ── River ── */
    .river {
      position: absolute;
      inset: 28% 0 0;
      background:
        radial-gradient(ellipse at 25% 35%, rgba(255,255,255,0.15), transparent 45%),
        radial-gradient(ellipse at 70% 45%, rgba(255,255,255,0.12), transparent 55%),
        linear-gradient(180deg, var(--water-top), var(--water-mid) 55%, var(--water-deep));
    }

    /* ── Water shimmer ── */
    .water-shimmer {
      position: absolute;
      top: 36%;
      left: 0;
      right: 0;
      height: 50%;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.06) 3%,
        transparent 6%
      );
      animation: shimmer-slide 6s linear infinite;
      pointer-events: none;
    }
    @keyframes shimmer-slide {
      0%   { transform: translateX(-10%); }
      100% { transform: translateX(10%); }
    }

    .waterline {
      position: absolute;
      left: 20%;
      right: 20%;
      top: 46%;
      height: 2px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 999px;
      box-shadow: 0 0 10px rgba(255,255,255,0.4);
      opacity: 0.5;
    }

    /* ── Shore ── */
    .shore {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 30%;
      background: linear-gradient(180deg, rgba(44,31,18,0.15), rgba(35,24,14,0.75));
      pointer-events: none;
    }

    /* ── Crowd ── */
    .crowd {
      position: absolute;
      bottom: 24%;
      left: 7%;
      display: flex;
      gap: 10px;
      transform: scale(0.7);
      transform-origin: bottom left;
    }
    .bystander { width: 52px; }
    .bystander .head {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #f4c9a7;
      margin: 0 auto;
    }
    .bystander .body {
      width: 40px;
      height: 80px;
      margin: 5px auto 0;
      border-radius: 16px 16px 10px 10px;
      background: linear-gradient(180deg, var(--r-top), var(--r-bottom));
    }

    /* ── John the Baptist ── */
    .john {
      position: absolute;
      left: 56%;
      top: 36%;
      transform: translateX(-50%) scale(0.7);
      transform-origin: top center;
    }
    .john .head {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #f0c19a, #d4995e);
      margin: 0 auto;
    }
    .john .body {
      width: 64px;
      height: 110px;
      margin: 7px auto 0;
      border-radius: 28px 28px 18px 18px;
      background: linear-gradient(180deg, #9d6c2f, #4f2f0e);
      position: relative;
    }
    .john .belt {
      position: absolute;
      width: 100%;
      height: 8px;
      background: rgba(0,0,0,0.22);
      top: 40%;
      border-radius: 4px;
    }
    .john .arm {
      position: absolute;
      top: 20%;
      width: 14px;
      height: 50px;
      background: #8b5d27;
      border-radius: 8px;
      transition: transform 0.8s ease;
    }
    .john .arm.left  { left: -10px; transform: rotate(10deg); transform-origin: top center; }
    .john .arm.right { right: -10px; transform: rotate(-10deg); transform-origin: top center; }
    .john.baptizing .arm.left  { transform: rotate(30deg); }
    .john.baptizing .arm.right { transform: rotate(-30deg); }

    .john .ripple-ring {
      position: absolute;
      bottom: -16px;
      left: 50%;
      width: 110px;
      height: 22px;
      border-radius: 50%;
      transform: translateX(-50%);
      border: 2px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.05);
    }

    /* ── Jesus ── */
    .jesus {
      --progress: 0%;
      position: absolute;
      bottom: 18%;
      left: calc(16% + var(--progress));
      transition: left var(--transition-smooth);
      transform: scale(0.7);
      transform-origin: bottom center;
    }
    .jesus .halo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.55);
      background: radial-gradient(circle, rgba(255,255,200,0.15), transparent 70%);
      margin: 0 auto -24px;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .jesus .head {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #f8d4ac, #dba06a);
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .jesus .body {
      width: 68px;
      height: 120px;
      margin: 8px auto 0;
      border-radius: 32px 32px 16px 16px;
      background: linear-gradient(180deg, #fff7df, #f0be6a);
      position: relative;
      overflow: hidden;
    }
    .jesus .body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0.35), transparent, rgba(255,255,255,0.2));
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    /* Walking legs */
    .jesus .legs {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: -6px;
    }
    .jesus .leg {
      width: 16px;
      height: 60px;
      border-radius: 10px;
      background: linear-gradient(180deg, #c79c69, #7f5833);
      transform-origin: top center;
    }
    .jesus.walking .leg.back  { animation: stride 0.7s ease-in-out infinite; }
    .jesus.walking .leg.front { animation: stride 0.7s ease-in-out infinite 0.35s; }

    @keyframes stride {
      0%, 100% { transform: rotate(8deg); }
      50%      { transform: rotate(-8deg); }
    }

    /* In-water state */
    .jesus.in-water .halo {
      opacity: 1;
      transform: scale(1);
    }
    .jesus.in-water .body::after { opacity: 1; }

    /* ── Ripples around Jesus ── */
    .ripples {
      --progress: 0%;
      position: absolute;
      bottom: 12%;
      left: calc(16% + var(--progress));
      width: 100px;
      height: 32px;
      transform: translateX(-20%);
      opacity: 0;
      transition: opacity 0.5s ease, left var(--transition-smooth);
      pointer-events: none;
    }
    .ripples span {
      position: absolute;
      inset: 0;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      animation: ripple-expand 2.4s linear infinite;
    }
    .ripples span:nth-child(2) { animation-delay: 0.8s; }
    .ripples span:nth-child(3) { animation-delay: 1.6s; }

    @keyframes ripple-expand {
      0%   { opacity: 0.75; transform: scale(0.6); }
      100% { opacity: 0;    transform: scale(1.5); }
    }
    .ripples.show { opacity: 1; }

    /* ───── Progress Dots ───── */
    .progress {
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    .progress-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(162, 231, 255, 0.5);
      background: transparent;
      transition: background 0.3s, border-color 0.3s, transform 0.3s;
    }
    .progress-dot.active {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(1.15);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    /* ───── Controls ───── */
    .controls {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .controls p {
      color: #dff6ff;
      line-height: 1.45;
      min-height: 2.5em;
      font-size: clamp(0.8rem, 2vw, 0.95rem);
      transition: opacity 0.3s ease;
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 10px 28px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      color: #092231;
      background: var(--accent);
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    button:not(:disabled):hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
    button:not(:disabled):active {
      transform: translateY(0);
    }

    /* ───── Mobile ───── */
    @media (max-width: 640px) {
      body { padding: 8px; }
      main {
        width: 100%;
        padding: 12px;
        gap: 10px;
        border-radius: 16px;
      }
      .scene {
        min-height: 180px;
        max-height: 280px;
        border-radius: 14px;
      }
      .crowd { transform: scale(0.5); }
      .john  { transform: translateX(-50%) scale(0.55); }
      .jesus { transform: scale(0.55); transform-origin: bottom center; }
      .sun   { width: 55px; height: 55px; }
      .dove::before, .dove::after { width: 30px; height: 10px; }
      .dove::before { left: -27px; }
      .dove::after  { right: -27px; }
      .heaven-light { width: 80px; }
      .ripples { width: 70px; height: 22px; }
      button { width: 100%; padding: 12px 20px; }
    }

    /* ───── Large screens ───── */
    @media (min-height: 800px) {
      .scene { max-height: 420px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Chapter 7 – Baptism in the Jordan</h1>
      <p>Guide Jesus through three reverent steps into the Jordan River toward John. On the final step, the heavens respond and the moment of baptism is complete.</p>
    </header>

    <section class="scene" aria-hidden="true">
      <div class="sun"></div>
      <div class="heaven-light" id="heavenLight"></div>
      <div class="dove" id="dove"></div>

      <div class="river"></div>
      <div class="water-shimmer"></div>
      <div class="waterline"></div>

      <div class="crowd">
        <div class="bystander" style="--r-top:#ffd2c1; --r-bottom:#ff8c64;">
          <div class="head"></div>
          <div class="body"></div>
        </div>
        <div class="bystander" style="--r-top:#d0d8ff; --r-bottom:#7488d4;">
          <div class="head"></div>
          <div class="body"></div>
        </div>
        <div class="bystander" style="--r-top:#fff2c4; --r-bottom:#ffbf5d;">
          <div class="head"></div>
          <div class="body"></div>
        </div>
      </div>

      <div class="john" id="john">
        <div class="head"></div>
        <div class="body">
          <span class="belt"></span>
          <span class="arm left"></span>
          <span class="arm right"></span>
        </div>
        <div class="ripple-ring"></div>
      </div>

      <div class="jesus" id="jesus">
        <div class="halo"></div>
        <div class="head"></div>
        <div class="body"></div>
        <div class="legs">
          <div class="leg back"></div>
          <div class="leg front"></div>
        </div>
      </div>

      <div class="ripples" id="ripples">
        <span></span><span></span><span></span>
      </div>

      <div class="shore"></div>
    </section>

    <div class="progress" aria-hidden="true">
      <span class="progress-dot" data-step="1"></span>
      <span class="progress-dot" data-step="2"></span>
      <span class="progress-dot" data-step="3"></span>
    </div>

    <section class="controls" aria-live="polite">
      <p id="status"></p>
      <div class="buttons">
        <button id="stepBtn">Take a Step</button>
        <button id="resetBtn">Reset Scene</button>
      </div>
    </section>
  </main>

  <script>
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    const els = {
      jesus:      $("#jesus"),
      ripples:    $("#ripples"),
      dove:       $("#dove"),
      john:       $("#john"),
      heavenLight:$("#heavenLight"),
      status:     $("#status"),
      stepBtn:    $("#stepBtn"),
      resetBtn:   $("#resetBtn"),
      dots:       $$(".progress-dot"),
    };

    const MAX_STEPS = 3;
    const POSITIONS = ["0%", "16%", "32%", "48%"];
    const MESSAGES = [
      "Step 0 of 3 — Jesus approaches the Jordan as John continues to baptize.",
      "Step 1 of 3 — Jesus places His first foot into the cool, flowing river. 🌊",
      "Step 2 of 3 — He wades deeper, drawing near to John with quiet resolve. 💧",
      "Step 3 of 3 — John baptizes Jesus; the Spirit descends like a dove and heaven's voice affirms Him! 🕊️",
    ];

    let step = 0;

    function render() {
      const pos = POSITIONS[step];

      els.jesus.style.setProperty("--progress", pos);
      els.ripples.style.setProperty("--progress", pos);

      els.jesus.classList.toggle("walking", step > 0 && step < MAX_STEPS);

      const inWater = step >= 1;
      els.ripples.classList.toggle("show", inWater);

      const baptized = step === MAX_STEPS;
      els.jesus.classList.toggle("in-water", baptized);
      els.dove.classList.toggle("show", baptized);
      els.heavenLight.classList.toggle("show", baptized);
      els.john.classList.toggle("baptizing", baptized);

      els.dots.forEach((dot, i) => {
        dot.classList.toggle("active", i < step);
      });

      els.status.textContent = MESSAGES[step];
      els.stepBtn.disabled = step >= MAX_STEPS;

      /* ── Chapter transition trigger ── */
      if (baptized) {
        chapterComplete();
      }
    }

    els.stepBtn.addEventListener("click", () => {
      if (step < MAX_STEPS) {
        step++;
        render();
      }
    });

    els.resetBtn.addEventListener("click", () => {
      step = 0;
      render();
      els.stepBtn.focus();
    });

    render();
  </script>

  <!-- ═══ CHAPTER TRANSITION OVERLAY ═══ -->
  <div id="chapterOverlay" style="
    position:fixed; inset:0; z-index:9999;
    background:rgba(35,20,5,.6);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition:opacity .5s ease;
    font-family:'Nunito',sans-serif;
  ">
    <div id="chapterCard" style="
      background:#fff8ee; border-radius:24px;
      padding:clamp(24px,5vw,40px); text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.3);
      max-width:88vw; width:360px;
      transform:scale(.8);
      transition:transform .5s cubic-bezier(.34,1.56,.64,1);
    ">
      <h2 id="ovTitle" style="font-size:clamp(1.15rem,3.5vw,1.5rem);color:#5c3b1a;margin:0 0 8px;"></h2>
      <p id="ovDone" style="color:#8a5a21;font-size:.9rem;margin:0 0 6px;line-height:1.4;"></p>
      <p id="ovNext" style="color:#9c6c32;font-size:.82rem;font-weight:600;margin:0 0 18px;"></p>
      <button id="ovBtn" style="
        border:none; border-radius:999px;
        background:linear-gradient(90deg,#a8e6cf,#55c89b);
        color:#1b5e3a; font-family:'Nunito',sans-serif;
        font-size:1rem; font-weight:700;
        padding:12px 28px; cursor:pointer;
        box-shadow:0 4px 14px rgba(85,200,155,.3);
        transition:transform .15s,box-shadow .2s;
      " onmouseover="this.style.transform='translateY(-2px)'"
         onmouseout="this.style.transform='none'"
      >Continue →</button>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════════
    // ★ LEVEL 7 SETTINGS
    // ════════════════════════════════════════════
    const THIS_CHAPTER   = 7;
    const CHAPTER_DONE   = "John baptized Jesus and the Spirit descended like a dove — heaven's voice affirmed Him!";
    const NEXT_FILE      = "indexjesus8.html";
    // ════════════════════════════════════════════

    const CHAPTER_TITLES = [
      "",
      "Gabriel Visits Mary",
      "Journey to Bethlehem",
      "No Room at the Inn",
      "Jesus Is Born",
      "Angels Tell the Shepherds",
      "Shepherds Visit Jesus",
      "Baptism in the Jordan",
      "Temptation in the Desert",
      "Jesus Begins His Ministry",
      "First Miracle at Cana"
    ];

    let chapterTriggered = false;

    function chapterComplete() {
      if (chapterTriggered) return;
      chapterTriggered = true;

      const ov   = document.getElementById('chapterOverlay');
      const card = document.getElementById('chapterCard');
      const nextChapter = THIS_CHAPTER + 1;
      const isLast = !NEXT_FILE;

      document.getElementById('ovTitle').textContent = isLast
        ? '🌟 The Christmas Story Complete!'
        : `✨ Chapter ${THIS_CHAPTER} Complete!`;

      document.getElementById('ovDone').textContent = CHAPTER_DONE;

      document.getElementById('ovNext').textContent = isLast
        ? 'You journeyed through the whole Christmas Story! 🎄'
        : `Next: Chapter ${nextChapter} — ${CHAPTER_TITLES[nextChapter] || ''}`;

      const btn = document.getElementById('ovBtn');
      btn.textContent = isLast ? '🔄 Play Again' : 'Continue →';
      btn.onclick = () => {
        window.location.href = isLast ? 'indexjesus1.html' : NEXT_FILE;
      };

      setTimeout(() => {
        ov.style.opacity = '1';
        ov.style.pointerEvents = 'auto';
        card.style.transform = 'scale(1)';
      }, 1500);
    }
  </script>
</body>
</html>
