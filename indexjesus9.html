<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chapter 9 – Jesus Begins His Ministry</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #b15a04;
      --accent-light: #e5920e;
      --accent-glow: rgba(177, 90, 4, 0.3);
      --bg-warm: #fdf8ec;
      --bg-gold: #f5e0b5;
      --card-bg: rgba(255, 255, 255, 0.94);
      --text-dark: #3f2c1b;
      --text-mid: #5d4631;
      --radius-lg: 28px;
      --radius-md: 20px;
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --s: 1;
      font-family: "Nunito", "Segoe UI", system-ui, sans-serif;
      color-scheme: only light;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; }

    body {
      height: 100dvh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: clamp(8px, 1.5vh, 20px);
      background: linear-gradient(180deg, var(--bg-warm) 0%, var(--bg-gold) 55%, #e3b26f 100%);
      color: var(--text-dark);
    }

    main {
      width: min(96vw, 960px);
      height: 100%;
      max-height: 100%;
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: clamp(10px, 2vh, 32px) clamp(14px, 3vw, 36px);
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.13);
      display: flex;
      flex-direction: column;
      gap: clamp(6px, 1.2vh, 16px);
      overflow: hidden;
    }

    header {
      text-align: center;
      flex-shrink: 0;
    }
    header h1 {
      font-size: clamp(1.2rem, 3.5vw, 2.4rem);
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    header p {
      margin: clamp(2px, 0.6vh, 10px) auto 0;
      max-width: 36rem;
      color: var(--text-mid);
      line-height: 1.45;
      font-size: clamp(0.75rem, 1.4vw, 0.95rem);
    }

    .scene {
      position: relative;
      width: 100%;
      flex: 1 1 0;
      min-height: 0;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: linear-gradient(180deg, #87CEEB 0%, #f8dcb0 30%, #f1c98b 55%, #d29d5d 75%, #b1783d 100%);
      box-shadow: inset 0 -20px 50px rgba(0, 0, 0, 0.2);
    }

    .sun {
      position: absolute;
      top: 5%;
      left: 10%;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff9e0 0%, #ffd36f 50%, transparent 72%);
      box-shadow: 0 0 80px rgba(255, 210, 111, 0.5);
      animation: sun-pulse 4s ease-in-out infinite alternate;
    }
    @keyframes sun-pulse {
      0%   { box-shadow: 0 0 80px rgba(255, 210, 111, 0.5); }
      100% { box-shadow: 0 0 110px rgba(255, 210, 111, 0.7); }
    }

    .sun-rays {
      position: absolute;
      top: 5%;
      left: 10%;
      width: 100px;
      height: 100px;
      pointer-events: none;
    }
    .sun-rays span {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 160px;
      height: 2px;
      background: linear-gradient(90deg, rgba(255, 220, 130, 0.35), transparent);
      transform-origin: 0 50%;
      border-radius: 999px;
      animation: ray-fade 4s ease-in-out infinite alternate;
    }
    .sun-rays span:nth-child(1) { transform: rotate(20deg); }
    .sun-rays span:nth-child(2) { transform: rotate(55deg); animation-delay: 0.5s; }
    .sun-rays span:nth-child(3) { transform: rotate(90deg); animation-delay: 1s; }
    .sun-rays span:nth-child(4) { transform: rotate(125deg); animation-delay: 1.5s; }
    .sun-rays span:nth-child(5) { transform: rotate(160deg); animation-delay: 2s; }
    @keyframes ray-fade {
      0%   { opacity: 0.3; }
      100% { opacity: 0.7; }
    }

    .birds {
      position: absolute;
      top: 12%;
      right: 18%;
      pointer-events: none;
    }
    .bird {
      position: absolute;
      width: 16px;
      height: 6px;
      border-top: 2px solid rgba(80, 50, 20, 0.35);
      border-left: 2px solid rgba(80, 50, 20, 0.35);
      border-right: 2px solid rgba(80, 50, 20, 0.35);
      border-bottom: none;
      border-radius: 50% 50% 0 0;
      animation: fly 3s ease-in-out infinite;
    }
    .bird:nth-child(1) { top: 0; left: 0; }
    .bird:nth-child(2) { top: 10px; left: 24px; animation-delay: 0.4s; width: 14px; }
    .bird:nth-child(3) { top: -4px; left: 48px; animation-delay: 0.8s; width: 12px; }
    @keyframes fly {
      0%, 100% { transform: scaleY(1); }
      50%      { transform: scaleY(0.5); }
    }

    .dust {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .dust span {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(210, 170, 110, 0.5);
      animation: float-up 5s ease-out infinite;
    }
    .dust span:nth-child(1) { bottom: 30%; left: 20%; animation-delay: 0s; }
    .dust span:nth-child(2) { bottom: 28%; left: 40%; animation-delay: 1s; }
    .dust span:nth-child(3) { bottom: 32%; left: 60%; animation-delay: 2s; }
    .dust span:nth-child(4) { bottom: 26%; left: 75%; animation-delay: 3s; }
    .dust span:nth-child(5) { bottom: 34%; left: 50%; animation-delay: 4s; }
    @keyframes float-up {
      0%   { transform: translateY(0) scale(1); opacity: 0; }
      15%  { opacity: 0.5; }
      100% { transform: translateY(-50px) scale(0.3); opacity: 0; }
    }

    .dunes {
      position: absolute;
      bottom: 26%;
      left: -8%;
      width: 116%;
      height: 42%;
      background: radial-gradient(ellipse at 30% 140%, #e5b066, #c18543 70%, #9d6331 100%);
      border-top-left-radius: 60% 100%;
      border-top-right-radius: 55% 100%;
    }
    .ground {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 30%;
      background: linear-gradient(180deg, #b07539, #7c4e1f);
    }
    .ground::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 8px;
      background: linear-gradient(180deg, rgba(0,0,0,0.1), transparent);
    }

    .stage {
      position: absolute;
      bottom: 16%;
      left: 5%;
      right: 5%;
      height: 20%;
      border-radius: 20px;
      border: 2px dashed rgba(56, 28, 9, 0.18);
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 4%;
      transform: scale(var(--s, 1));
      transform-origin: bottom center;
    }

    .jesus {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateY(-18px);
      position: relative;
      z-index: 2;
    }

    .jesus .halo {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 3px solid rgba(255, 237, 178, 0.8);
      background: radial-gradient(circle, rgba(255, 245, 200, 0.15), transparent 70%);
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      filter: drop-shadow(0 0 14px rgba(255, 237, 178, 0.65));
      animation: halo-glow 3s ease-in-out infinite alternate;
    }
    @keyframes halo-glow {
      0%   { filter: drop-shadow(0 0 14px rgba(255, 237, 178, 0.5)); }
      100% { filter: drop-shadow(0 0 24px rgba(255, 237, 178, 0.85)); }
    }

    .jesus .head {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #ffe7ce, #f0cfa1);
      border: 2.5px solid rgba(0, 0, 0, 0.06);
      position: relative;
      z-index: 1;
    }

    .jesus .body {
      width: 110px;
      height: 148px;
      margin-top: 8px;
      border-radius: 44px 18px 18px 30px;
      background: linear-gradient(180deg, #fff1db, #e5b066);
      position: relative;
      overflow: hidden;
    }
    .jesus .body .sash {
      position: absolute;
      top: 20%;
      left: 20%;
      width: 60%;
      height: 60%;
      background: linear-gradient(180deg, rgba(180, 120, 50, 0.2), transparent);
      border-radius: 20px;
      transform: rotate(-8deg);
    }

    .word-ripples {
      position: absolute;
      top: 40%;
      left: 18%;
      width: 0;
      height: 0;
      pointer-events: none;
      z-index: 1;
    }
    .word-ripples span {
      position: absolute;
      border: 2px solid rgba(255, 220, 130, 0);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
    }
    .word-ripples.active span {
      animation: ripple-out 2.5s ease-out infinite;
    }
    .word-ripples span:nth-child(1) { animation-delay: 0s; }
    .word-ripples span:nth-child(2) { animation-delay: 0.8s; }
    .word-ripples span:nth-child(3) { animation-delay: 1.6s; }
    @keyframes ripple-out {
      0%   { width: 20px; height: 20px; border-color: rgba(255, 200, 80, 0.6); opacity: 0.7; }
      100% { width: 200px; height: 200px; border-color: rgba(255, 200, 80, 0); opacity: 0; }
    }

    .crowd-wrap {
      width: 55%;
      max-width: 480px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      justify-items: center;
      transform: translateY(4px);
    }

    .listener {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.5s var(--ease-smooth);
    }
    .listener.raised { transform: translateY(-4px); }

    .listener .head {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #e8c08a, #d8ab7a);
      margin-bottom: 5px;
      position: relative;
      z-index: 1;
    }

    .listener .torso {
      width: 40px;
      height: 78px;
      border-radius: 18px 18px 12px 12px;
      position: relative;
      z-index: 0;
    }
    .listener:nth-child(1) .torso { background: linear-gradient(180deg, #c49362, #8d6238); }
    .listener:nth-child(2) .torso { background: linear-gradient(180deg, #a87d50, #6e4c28); }
    .listener:nth-child(3) .torso { background: linear-gradient(180deg, #d6a45e, #a06c31); }
    .listener:nth-child(4) .torso { background: linear-gradient(180deg, #b48945, #7e5525); }
    .listener:nth-child(5) .torso { background: linear-gradient(180deg, #c09058, #8a6030); }
    .listener:nth-child(6) .torso { background: linear-gradient(180deg, #b47a3a, #7e4e20); }

    .listener .arm {
      position: absolute;
      top: 30px;
      width: 11px;
      height: 58px;
      border-radius: 16px;
      background: linear-gradient(180deg, #e3bc8b, #b17a46);
      transform-origin: top center;
      transition: transform 0.55s var(--ease-smooth), opacity 0.4s ease;
      opacity: 0.85;
      z-index: 0;
    }
    .listener .arm.left  { left: 2px; transform: rotate(18deg); }
    .listener .arm.right { right: 2px; transform: rotate(-18deg); }

    .listener.raised .arm.left  { transform: rotate(-72deg); opacity: 1; }
    .listener.raised .arm.right { transform: rotate(72deg); opacity: 1; }

    .listener[data-group="1"].raised .arm { transition-delay: 0s; }
    .listener[data-group="2"].raised .arm { transition-delay: 0.15s; }
    .listener[data-group="3"].raised .arm { transition-delay: 0.3s; }

    .listener .sparkle {
      position: absolute;
      top: -6px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 220, 120, 0.8);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .listener .sparkle:nth-child(1) { left: 10px; }
    .listener .sparkle:nth-child(2) { right: 10px; }
    .listener.raised .sparkle {
      opacity: 1;
      animation: sparkle-float 1.5s ease-in-out infinite;
    }
    .listener.raised .sparkle:nth-child(2) { animation-delay: 0.5s; }
    @keyframes sparkle-float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; }
      50%      { transform: translateY(-10px) scale(1.3); opacity: 1; }
    }

    .scripture {
      position: absolute;
      top: 8%;
      right: 8%;
      text-align: right;
      font-size: clamp(0.65rem, 1.4vw, 0.88rem);
      font-weight: 700;
      color: rgba(90, 50, 10, 0.85);
      text-shadow: 0 1px 4px rgba(255, 255, 255, 0.5);
      line-height: 1.5;
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 1s ease 0.4s, transform 1s ease 0.4s;
      max-width: 42%;
      z-index: 6;
    }
    .scripture.show {
      opacity: 1;
      transform: translateY(0);
    }

    .light-beam {
      position: absolute;
      bottom: 20%;
      left: 8%;
      width: 160px;
      height: 200px;
      background: linear-gradient(180deg, rgba(255, 240, 180, 0.15), transparent);
      clip-path: polygon(40% 0%, 60% 0%, 100% 100%, 0% 100%);
      transform: translateY(-30px);
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: none;
      z-index: 1;
    }
    .light-beam.show { opacity: 1; }

    .progress {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .progress-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(177, 90, 4, 0.3);
      background: transparent;
      transition: all 0.35s var(--ease-smooth);
    }
    .progress-dot.active {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(1.15);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .controls {
      background: rgba(177, 90, 4, 0.06);
      border: 1px solid rgba(177, 90, 4, 0.08);
      border-radius: var(--radius-md);
      padding: clamp(8px, 1.5vh, 18px) clamp(12px, 2vw, 20px);
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: clamp(6px, 1vh, 12px);
      flex-shrink: 0;
    }
    .controls p {
      color: #4c321d;
      line-height: 1.45;
      font-size: clamp(0.78rem, 1.3vw, 0.95rem);
      min-height: 2.4em;
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: clamp(8px, 1.2vh, 12px) clamp(18px, 3vw, 32px);
      font-family: inherit;
      font-size: clamp(0.82rem, 1.2vw, 1rem);
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: var(--accent);
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s, background 0.3s;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    button:not(:disabled):hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      background: var(--accent-light);
    }
    button:not(:disabled):active {
      transform: translateY(0);
    }

    @media (max-height: 680px) {
      header p { display: none; }
      .controls p { min-height: 0; }
      .birds { display: none; }
      .dust { display: none; }
    }

    @media (max-width: 720px) {
      body {
        height: auto;
        min-height: 100dvh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      main {
        height: auto;
        max-height: none;
        overflow: visible;
        gap: 14px;
        padding: 16px;
      }
      .scene {
        flex: 0 0 auto;
        aspect-ratio: 4 / 3;
        min-height: 260px;
        max-height: 400px;
      }
      .stage {
        flex-direction: column;
        align-items: center;
        gap: 14px;
        height: auto;
        padding: 18px 10px 28px;
      }
      .jesus { transform: none; }
      .crowd-wrap {
        width: 100%;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .scripture { max-width: 55%; font-size: 0.68rem; }
      .light-beam { display: none; }
      button { width: 100%; }
    }

    @media (max-width: 400px) {
      .scene { aspect-ratio: 1 / 1; min-height: 240px; }
      header h1 { font-size: 1.1rem; }
      .crowd-wrap { gap: 6px; }
      .listener .torso { height: 60px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Chapter 9 – Ministry Begins</h1>
      <p>Jesus proclaims the good news. Each time you share the message, more listeners lift their arms in praise.</p>
    </header>

    <section class="scene" aria-hidden="true">
      <div class="sun"></div>
      <div class="sun-rays">
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <div class="birds">
        <div class="bird"></div>
        <div class="bird"></div>
        <div class="bird"></div>
      </div>

      <div class="dust">
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <div class="dunes"></div>
      <div class="ground"></div>

      <div class="light-beam" id="lightBeam"></div>

      <div class="word-ripples" id="wordRipples">
        <span></span><span></span><span></span>
      </div>

      <div class="stage">
        <div class="jesus" id="jesus">
          <div class="halo"></div>
          <div class="head"></div>
          <div class="body">
            <div class="sash"></div>
          </div>
        </div>

        <div class="crowd-wrap">
          <div class="listener" data-group="1">
            <div class="sparkle"></div>
            <div class="sparkle"></div>
            <div class="arm left"></div>
            <div class="arm right"></div>
            <div class="head"></div>
            <div class="torso"></div>
          </div>
          <div class="listener" data-group="1">
            <div class="sparkle"></div>
            <div class="sparkle"></div>
            <div class="arm left"></div>
            <div class="arm right"></div>
            <div class="head"></div>
            <div class="torso"></div>
          </div>
          <div class="listener" data-group="2">
            <div class="sparkle"></div>
            <div class="sparkle"></div>
            <div class="arm left"></div>
            <div class="arm right"></div>
            <div class="head"></div>
            <div class="torso"></div>
          </div>
          <div class="listener" data-group="2">
            <div class="sparkle"></div>
            <div class="sparkle"></div>
            <div class="arm left"></div>
            <div class="arm right"></div>
            <div class="head"></div>
            <div class="torso"></div>
          </div>
          <div class="listener" data-group="3">
            <div class="sparkle"></div>
            <div class="sparkle"></div>
            <div class="arm left"></div>
            <div class="arm right"></div>
            <div class="head"></div>
            <div class="torso"></div>
          </div>
          <div class="listener" data-group="3">
            <div class="sparkle"></div>
            <div class="sparkle"></div>
            <div class="arm left"></div>
            <div class="arm right"></div>
            <div class="head"></div>
            <div class="torso"></div>
          </div>
        </div>
      </div>

      <div class="scripture" id="scripture">
        "The Spirit of the Lord is on me,<br/>
        because He has anointed me<br/>
        to proclaim good news."<br/>
        <span style="opacity:0.6; font-size:0.88em;">— Luke 4:18</span>
      </div>
    </section>

    <div class="progress" aria-hidden="true">
      <span class="progress-dot" data-step="1"></span>
      <span class="progress-dot" data-step="2"></span>
      <span class="progress-dot" data-step="3"></span>
    </div>

    <section class="controls" aria-live="polite">
      <p id="status"></p>
      <div class="buttons">
        <button id="stepBtn">Share the Message</button>
        <button id="resetBtn">Reset Scene</button>
      </div>
    </section>
  </main>

  <script>
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    const els = {
      scene:       $(".scene"),
      listeners:   $$(".listener"),
      dots:        $$(".progress-dot"),
      stepBtn:     $("#stepBtn"),
      resetBtn:    $("#resetBtn"),
      status:      $("#status"),
      scripture:   $("#scripture"),
      lightBeam:   $("#lightBeam"),
      wordRipples: $("#wordRipples"),
    };

    const MAX = 3;

    const MESSAGES = [
      "Step 0 of 3 — Jesus begins to preach; the crowd watches intently.",
      "Step 1 of 3 — The closest listeners lift their hands in praise. 🙌",
      "Step 2 of 3 — The middle listeners join, hearts stirred by the message. ✨",
      "Step 3 of 3 — The entire gathering raises their arms, rejoicing in the good news! 🕊️",
    ];

    let step = 0;

    function scaleScene() {
      if (!els.scene) return;
      const h = els.scene.clientHeight;
      const ideal = 480;
      const s = Math.min(1, h / ideal);
      els.scene.style.setProperty("--s", s);
    }

    function render() {
      const atPeak = step === MAX;
      const preaching = step > 0;

      els.listeners.forEach(l => {
        const g = Number(l.dataset.group);
        l.classList.toggle("raised", g <= step);
      });

      els.dots.forEach((d, i) => d.classList.toggle("active", i < step));

      els.wordRipples.classList.toggle("active", preaching);

      els.lightBeam.classList.toggle("show", step >= 2);

      els.scripture.classList.toggle("show", atPeak);

      els.status.textContent = MESSAGES[step];

      els.stepBtn.disabled = atPeak;

      if (atPeak) {
        chapterComplete();
      }
    }

    els.stepBtn.addEventListener("click", () => {
      if (step < MAX) {
        step++;
        render();
      }
    });

    els.resetBtn.addEventListener("click", () => {
      step = 0;
      chapterTriggered = false;

      /* ── Dismiss the overlay smoothly ── */
      document.getElementById('chapterOverlay').style.opacity = '0';
      document.getElementById('chapterOverlay').style.pointerEvents = 'none';
      document.getElementById('chapterCard').style.transform = 'scale(.8)';

      render();
      els.stepBtn.focus();
    });

    window.addEventListener("resize", scaleScene);
    scaleScene();
    render();
  </script>

  <!-- ═══ CHAPTER TRANSITION OVERLAY ═══ -->
  <div id="chapterOverlay" style="
    position:fixed; inset:0; z-index:9999;
    background:rgba(35,20,5,.6);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition:opacity .5s ease;
    font-family:'Nunito',sans-serif;
  ">
    <div id="chapterCard" style="
      background:#fff8ee; border-radius:24px;
      padding:clamp(24px,5vw,40px); text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.3);
      max-width:88vw; width:360px;
      transform:scale(.8);
      transition:transform .5s cubic-bezier(.34,1.56,.64,1);
    ">
      <h2 id="ovTitle" style="font-size:clamp(1.15rem,3.5vw,1.5rem);color:#5c3b1a;margin:0 0 8px;"></h2>
      <p id="ovDone" style="color:#8a5a21;font-size:.9rem;margin:0 0 6px;line-height:1.4;"></p>
      <p id="ovNext" style="color:#9c6c32;font-size:.82rem;font-weight:600;margin:0 0 18px;"></p>
      <button id="ovBtn" style="
        border:none; border-radius:999px;
        background:linear-gradient(90deg,#a8e6cf,#55c89b);
        color:#1b5e3a; font-family:'Nunito',sans-serif;
        font-size:1rem; font-weight:700;
        padding:12px 28px; cursor:pointer;
        box-shadow:0 4px 14px rgba(85,200,155,.3);
        transition:transform .15s,box-shadow .2s;
      " onmouseover="this.style.transform='translateY(-2px)'"
         onmouseout="this.style.transform='none'"
      >Continue →</button>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════════
    // ★ CHAPTER 9 → CHAPTER 10 CONNECTION
    // ════════════════════════════════════════════
    const THIS_CHAPTER   = 9;
    const CHAPTER_DONE   = "Jesus began His ministry, proclaiming the good news to all who would listen!";
    const NEXT_FILE      = "indexjesus10.html";
    // ════════════════════════════════════════════

    const CHAPTER_TITLES = [
      "",                                       //  0
      "Gabriel Visits Mary",                    //  1
      "Journey to Bethlehem",                   //  2
      "No Room at the Inn",                     //  3
      "Jesus Is Born",                          //  4
      "Angels Tell the Shepherds",              //  5
      "Shepherds Visit Jesus",                  //  6
      "The Wise Men Follow the Star",           //  7
      "Gifts for the King",                     //  8
      "Jesus Begins His Ministry",              //  9
      "First Miracle at Cana",                  // 10
      "Jesus Cleans God\u2019s House",          // 11
      "Jesus and Nicodemus",                    // 12
      "Healing the Official\u2019s Son",        // 13
      "The Great Catch of Fish",                // 14
      "Healing the Paralyzed Man",              // 15
      "Jesus Calms the Storm"                   // 16
    ];

    let chapterTriggered = false;

    function chapterComplete() {
      if (chapterTriggered) return;
      chapterTriggered = true;

      const ov   = document.getElementById('chapterOverlay');
      const card = document.getElementById('chapterCard');
      const nextChapter = THIS_CHAPTER + 1;
      const isLast = !NEXT_FILE;

      document.getElementById('ovTitle').textContent = isLast
        ? '\uD83C\uDF1F The Story Complete!'
        : `\u2728 Chapter ${THIS_CHAPTER} Complete!`;

      document.getElementById('ovDone').textContent = CHAPTER_DONE;

      document.getElementById('ovNext').textContent = isLast
        ? 'You journeyed through the whole story!'
        : `Next: Chapter ${nextChapter} \u2014 ${CHAPTER_TITLES[nextChapter] || ''}`;

      const btn = document.getElementById('ovBtn');
      btn.textContent = isLast ? '\uD83D\uDD04 Play Again' : 'Continue \u2192';
      btn.onclick = () => {
        window.location.href = isLast ? 'indexjesus1.html' : NEXT_FILE;
      };

      setTimeout(() => {
        ov.style.opacity = '1';
        ov.style.pointerEvents = 'auto';
        card.style.transform = 'scale(1)';
      }, 1500);
    }
  </script>
</body>
</html>
