<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chapter 15 – Healing the Paralyzed Man</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #a0451b;
      --accent-light: #c45a28;
      --accent-glow: rgba(160, 69, 27, 0.3);
      --card-bg: rgba(255, 255, 255, 0.95);
      --text-dark: #1a3040;
      --text-mid: #2a4a5a;
      --radius-lg: 28px;
      --radius-md: 20px;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --s: 1;
      font-family: "Nunito", "Segoe UI", system-ui, sans-serif;
      color-scheme: only light;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; }

    body {
      height: 100dvh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: clamp(8px, 1.5vh, 20px);
      background: linear-gradient(180deg, #f0e0c8 0%, #e0d0b0 40%, #d0c098 100%);
      color: var(--text-dark);
    }

    main {
      width: min(96vw, 960px);
      height: 100%;
      max-height: 100%;
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: clamp(10px, 2vh, 32px) clamp(14px, 3vw, 36px);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      gap: clamp(6px, 1.2vh, 16px);
      overflow: hidden;
    }

    /* ── Header ── */
    header { text-align: center; flex-shrink: 0; }
    header h1 {
      font-size: clamp(1.15rem, 3.5vw, 2.3rem);
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    header p {
      margin: clamp(2px, 0.6vh, 10px) auto 0;
      max-width: 38rem;
      color: var(--text-mid);
      line-height: 1.45;
      font-size: clamp(0.75rem, 1.4vw, 0.95rem);
    }

    /* ── Scene ── */
    .scene {
      position: relative;
      width: 100%;
      flex: 1 1 0;
      min-height: 0;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: linear-gradient(180deg,
        #c8d8e8 0%,
        #d4dce4 8%,
        #e0d8c8 14%,
        #e8dcc8 20%,
        #f0e4d0 100%
      );
      box-shadow: inset 0 -25px 55px rgba(0, 0, 0, 0.22);
    }

    /* ── Sun ── */
    .sun {
      position: absolute;
      top: 1%;
      left: 10%;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: radial-gradient(circle, #fffadd 0%, #ffd680 50%, transparent 70%);
      box-shadow: 0 0 55px rgba(255, 200, 80, 0.35);
      animation: sun-pulse 5s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes sun-pulse {
      0%   { box-shadow: 0 0 45px rgba(255, 200, 80, 0.25); }
      100% { box-shadow: 0 0 75px rgba(255, 200, 80, 0.5); }
    }

    /* ── Distant buildings ── */
    .dist-bldgs {
      position: absolute;
      bottom: 84%;
      left: 0; right: 0;
      height: 10%;
      z-index: 0;
      pointer-events: none;
    }
    .db {
      position: absolute;
      bottom: 0;
      background: rgba(180, 160, 130, 0.28);
      border-radius: 2px 2px 0 0;
    }
    .db-1 { left: 1%;  width: 7%;  height: 55%; }
    .db-2 { left: 10%; width: 5%;  height: 75%; }
    .db-3 { left: 17%; width: 8%;  height: 45%; }
    .db-4 { right: 2%;  width: 8%;  height: 65%; }
    .db-5 { right: 12%; width: 6%;  height: 50%; }
    .db-6 { right: 20%; width: 4%;  height: 85%; }

    /* ── Ground / Street ── */
    .ground {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 10%;
      background: linear-gradient(180deg, #c4a878, #b89860, #a88850);
      z-index: 1;
    }
    .ground::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(180deg, rgba(0,0,0,0.1), transparent);
    }
    .ground-texture {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 10%;
      z-index: 1;
      background-image: repeating-linear-gradient(90deg, rgba(0,0,0,0.02) 0 1px, transparent 1px 60px);
      pointer-events: none;
    }

    /* ═══════════════════════════════════════
       HOUSE STRUCTURE (cross-section view)
       ═══════════════════════════════════════ */

    /* Interior back wall */
    .house-interior {
      position: absolute;
      bottom: 10%;
      left: 14%;
      right: 14%;
      height: 68%;
      background: linear-gradient(180deg, #f0e4d0, #ecdcc4, #e4d0b4);
      box-shadow: inset 0 0 50px rgba(0,0,0,0.06);
      z-index: 1;
    }
    /* Interior texture (subtle plaster look) */
    .house-interior::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 30%, rgba(255,240,200,0.15), transparent 50%),
        radial-gradient(ellipse at 80% 60%, rgba(200,180,140,0.08), transparent 40%);
      pointer-events: none;
    }

    /* Stone floor */
    .house-floor {
      position: absolute;
      bottom: 10%;
      left: 14%;
      right: 14%;
      height: 3%;
      background: linear-gradient(180deg, #a89880, #988870, #908068);
      z-index: 1;
    }
    .house-floor::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(90deg,
        rgba(0,0,0,0.03) 0 1px, transparent 1px 18px
      );
    }

    /* Left wall */
    .wall-l {
      position: absolute;
      bottom: 10%;
      left: 10%;
      width: 4%;
      height: 73%;
      background: linear-gradient(90deg, #b09878, #c4a888, #bca480);
      z-index: 2;
      border-radius: 2px 0 0 0;
    }
    .wall-l::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.06), transparent 15%, transparent 85%, rgba(0,0,0,0.08));
    }
    .wall-l::after {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(0,0,0,0.06);
    }

    /* Right wall */
    .wall-r {
      position: absolute;
      bottom: 10%;
      right: 10%;
      width: 4%;
      height: 73%;
      background: linear-gradient(90deg, #bca480, #c4a888, #b09878);
      z-index: 2;
      border-radius: 0 2px 0 0;
    }
    .wall-r::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.06), transparent 15%, transparent 85%, rgba(0,0,0,0.08));
    }
    .wall-r::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(0,0,0,0.06);
    }

    /* ── Roof (two halves that split) ── */
    .roof-l {
      position: absolute;
      bottom: 78%;
      left: 8%;
      right: 52%;
      height: 5%;
      background: linear-gradient(180deg, #a87050, #905838, #804830);
      z-index: 3;
      border-radius: 3px 0 0 0;
      transition: right 1.2s var(--ease);
    }
    .roof-l.open { right: 56%; }

    .roof-r {
      position: absolute;
      bottom: 78%;
      left: 52%;
      right: 8%;
      height: 5%;
      background: linear-gradient(180deg, #a87050, #905838, #804830);
      z-index: 3;
      border-radius: 0 3px 0 0;
      transition: left 1.2s var(--ease);
    }
    .roof-r.open { left: 56%; }

    /* Roof tile texture */
    .roof-l::before, .roof-r::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(90deg,
        rgba(0,0,0,0.04) 0 2px, transparent 2px 14px
      );
    }
    /* Roof bottom edge shadow */
    .roof-l::after, .roof-r::after {
      content: "";
      position: absolute;
      bottom: -4px;
      left: 0; right: 0;
      height: 5px;
      background: linear-gradient(180deg, rgba(80,40,20,0.12), transparent);
    }

    /* ── Windows ── */
    .window {
      position: absolute;
      bottom: 58%;
      z-index: 3;
      width: 2.5%;
      height: 5%;
      background: linear-gradient(180deg, #ddd0b8, #c8b8a0);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 4px 4px 0 0;
    }
    .win-l { left: 10.6%; }
    .win-r { right: 10.6%; }

    /* ── Oil lamp glow ── */
    .lamp-glow {
      position: absolute;
      bottom: 38%;
      left: 18%;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 200, 100, 0.18), transparent 60%);
      z-index: 1;
      pointer-events: none;
      animation: lamp-flicker 3s ease-in-out infinite alternate;
    }
    .lamp-glow-2 {
      position: absolute;
      bottom: 32%;
      right: 22%;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 200, 100, 0.12), transparent 60%);
      z-index: 1;
      pointer-events: none;
      animation: lamp-flicker 4s ease-in-out infinite alternate-reverse;
    }
    @keyframes lamp-flicker {
      0%   { opacity: 0.65; }
      50%  { opacity: 1; }
      100% { opacity: 0.7; }
    }

    /* ═══════════════════════════════════════
       JESUS FIGURE (inside, left)
       ═══════════════════════════════════════ */
    .jesus {
      position: absolute;
      bottom: 14%;
      left: 22%;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 4;
      transform: scale(var(--s));
      transform-origin: bottom center;
    }
    .jesus .halo {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 3px solid rgba(255, 237, 178, 0.5);
      background: radial-gradient(circle, rgba(255, 245, 200, 0.08), transparent 70%);
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      filter: drop-shadow(0 0 8px rgba(255, 237, 178, 0.3));
      animation: halo-glow 3s ease-in-out infinite alternate;
      transition: filter 0.8s ease, border-color 0.8s ease;
    }
    @keyframes halo-glow {
      0%   { filter: drop-shadow(0 0 8px rgba(255, 237, 178, 0.25)); }
      100% { filter: drop-shadow(0 0 16px rgba(255, 237, 178, 0.5)); }
    }
    .jesus.speaking .halo {
      border-color: rgba(255, 237, 178, 1);
      filter: drop-shadow(0 0 28px rgba(255, 237, 178, 0.95));
      animation: halo-surge 1.5s ease-in-out infinite alternate;
    }
    @keyframes halo-surge {
      0%   { filter: drop-shadow(0 0 20px rgba(255, 237, 178, 0.8)); }
      100% { filter: drop-shadow(0 0 38px rgba(255, 245, 200, 1)); }
    }
    .jesus .head {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #ffe7ce, #f0cfa1);
      border: 2px solid rgba(0, 0, 0, 0.05);
      position: relative;
      z-index: 1;
    }
    .jesus .body {
      width: 68px;
      height: 90px;
      margin-top: 4px;
      border-radius: 32px 18px 12px 12px;
      background: linear-gradient(180deg, #fff2dd, #e6b46a);
      position: relative;
      overflow: hidden;
    }
    .jesus .sash {
      position: absolute;
      top: 16%;
      left: 18%;
      width: 64%;
      height: 50%;
      background: linear-gradient(180deg, rgba(190, 130, 55, 0.18), transparent);
      border-radius: 12px;
      transform: rotate(-6deg);
    }
    .jesus .arm {
      position: absolute;
      right: -16px;
      top: 28%;
      width: 20px;
      height: 7px;
      background: #f0cfa1;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.5s ease;
      transform: rotate(0deg);
    }
    .jesus.speaking .arm {
      opacity: 1;
      transform: rotate(-20deg);
    }
    .jesus .speak-burst {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 245, 200, 0.2), transparent 65%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .jesus.speaking .speak-burst {
      opacity: 1;
      animation: burst-pulse 2s ease-in-out infinite;
    }
    @keyframes burst-pulse {
      0%   { transform: translateX(-50%) scale(0.7); opacity: 0.5; }
      50%  { transform: translateX(-50%) scale(1.3); opacity: 0.2; }
      100% { transform: translateX(-50%) scale(0.7); opacity: 0.5; }
    }

    /* ═══════════════════════════════════════
       CROWD FIGURES (inside house)
       ═══════════════════════════════════════ */
    .crowd {
      position: absolute;
      bottom: 13%;
      left: 14%;
      right: 14%;
      height: 32%;
      z-index: 3;
      pointer-events: none;
    }
    .cf {
      position: absolute;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: crowd-idle 3s ease-in-out infinite alternate;
    }
    .cf:nth-child(2) { animation-delay: 0.4s; }
    .cf:nth-child(3) { animation-delay: 0.8s; }
    .cf:nth-child(4) { animation-delay: 1.2s; }
    .cf:nth-child(5) { animation-delay: 1.6s; }
    @keyframes crowd-idle {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-2px); }
    }
    .crowd.amazed .cf {
      animation: crowd-amazed 1.5s ease-in-out infinite;
    }
    .crowd.amazed .cf:nth-child(2) { animation-delay: 0.2s; }
    .crowd.amazed .cf:nth-child(3) { animation-delay: 0.4s; }
    .crowd.amazed .cf:nth-child(4) { animation-delay: 0.6s; }
    .crowd.amazed .cf:nth-child(5) { animation-delay: 0.8s; }
    @keyframes crowd-amazed {
      0%   { transform: translateY(0) rotate(0); }
      50%  { transform: translateY(-6px) rotate(-3deg); }
      100% { transform: translateY(0) rotate(0); }
    }
    .cf-head {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #f0d4aa, #d4b88a);
    }
    .cf-body {
      width: 24px;
      height: 32px;
      margin-top: 2px;
      border-radius: 10px 10px 6px 6px;
    }
    .cf-1 { right: 14%; }
    .cf-1 .cf-body { background: linear-gradient(180deg, #8a7060, #6a5040); }
    .cf-2 { right: 28%; }
    .cf-2 .cf-body { background: linear-gradient(180deg, #6a7868, #4a5848); width: 22px; height: 28px; }
    .cf-3 { right: 4%; }
    .cf-3 .cf-body { background: linear-gradient(180deg, #7a6858, #5a4838); width: 20px; height: 26px; }
    .cf-4 { left: 38%; }
    .cf-4 .cf-body { background: linear-gradient(180deg, #887060, #685040); width: 22px; height: 30px; }
    .cf-5 { left: 52%; }
    .cf-5 .cf-body { background: linear-gradient(180deg, #6a6858, #4a4838); width: 20px; height: 27px; }

    /* ═══════════════════════════════════════
       FRIENDS ON ROOF (4 figures)
       ═══════════════════════════════════════ */
    .roof-friends {
      position: absolute;
      bottom: 83%;
      left: 50%;
      transform: translateX(-50%) scale(var(--s));
      transform-origin: bottom center;
      width: 130px;
      height: 48px;
      z-index: 6;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }
    .roof-friends.visible { opacity: 1; }

    .rf {
      position: absolute;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform-origin: bottom center;
    }
    .rf-head {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #f0d4aa, #d4b88a);
    }
    .rf-body {
      width: 18px;
      height: 26px;
      margin-top: 1px;
      border-radius: 8px 8px 4px 4px;
    }
    .rf-1 { left: 4px; }
    .rf-1 .rf-body { background: linear-gradient(180deg, #7a8a70, #5a6a50); }
    .rf-2 { left: 30px; }
    .rf-2 .rf-body { background: linear-gradient(180deg, #8a6a50, #6a4a30); }
    .rf-3 { right: 30px; }
    .rf-3 .rf-body { background: linear-gradient(180deg, #6a7a6a, #4a5a4a); }
    .rf-4 { right: 4px; }
    .rf-4 .rf-body { background: linear-gradient(180deg, #7a6860, #5a4840); }

    .roof-friends.leaning .rf {
      animation: lean-over 2s ease-in-out infinite alternate;
    }
    .roof-friends.leaning .rf:nth-child(2) { animation-delay: 0.3s; }
    .roof-friends.leaning .rf:nth-child(3) { animation-delay: 0.6s; }
    .roof-friends.leaning .rf:nth-child(4) { animation-delay: 0.9s; }
    @keyframes lean-over {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(10deg) translateY(3px); }
    }

    /* ═══════════════════════════════════════
       LIGHT BEAM THROUGH OPENING
       ═══════════════════════════════════════ */
    .light-beam {
      position: absolute;
      top: 17%;
      left: 50%;
      transform: translateX(-50%);
      width: 13%;
      height: 60%;
      background: linear-gradient(180deg,
        rgba(255, 245, 200, 0.4),
        rgba(255, 245, 200, 0.18) 30%,
        rgba(255, 245, 200, 0.06) 70%,
        transparent
      );
      clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%);
      opacity: 0;
      transition: opacity 1.2s ease;
      z-index: 4;
      pointer-events: none;
    }
    .light-beam.active {
      opacity: 1;
      animation: beam-shimmer 4s ease-in-out infinite alternate;
    }
    @keyframes beam-shimmer {
      0%   { opacity: 0.6; }
      50%  { opacity: 1; }
      100% { opacity: 0.65; }
    }

    /* Dust motes in the light */
    .dust {
      position: absolute;
      top: 19%;
      left: 50%;
      transform: translateX(-50%);
      width: 10%;
      height: 55%;
      z-index: 4;
      pointer-events: none;
      overflow: hidden;
    }
    .dust-p {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255, 240, 180, 0.7);
      opacity: 0;
      left: 40%;
    }
    .dust.active .dust-p { animation: dust-fall 5s linear infinite; }
    .dust.active .dust-p:nth-child(2) { animation-delay: 0.8s; left: 25%; }
    .dust.active .dust-p:nth-child(3) { animation-delay: 1.6s; left: 60%; }
    .dust.active .dust-p:nth-child(4) { animation-delay: 2.4s; left: 15%; }
    .dust.active .dust-p:nth-child(5) { animation-delay: 3.2s; left: 70%; }
    .dust.active .dust-p:nth-child(6) { animation-delay: 0.4s; left: 50%; }
    .dust.active .dust-p:nth-child(7) { animation-delay: 2.0s; left: 35%; }
    @keyframes dust-fall {
      0%   { top: -5%; opacity: 0; transform: translateX(0); }
      10%  { opacity: 0.8; }
      50%  { transform: translateX(6px); }
      90%  { opacity: 0.3; }
      100% { top: 100%; opacity: 0; transform: translateX(-4px); }
    }

    /* ── Roof debris (plays once) ── */
    .debris {
      position: absolute;
      top: 22%;
      left: 50%;
      transform: translateX(-50%);
      width: 16%;
      height: 35%;
      z-index: 5;
      pointer-events: none;
    }
    .debris-p {
      position: absolute;
      top: 0;
      border-radius: 1px;
      opacity: 0;
    }
    .debris.active .debris-p { animation: debris-fall 1.6s ease-out forwards; }
    .debris.active .debris-p:nth-child(1) { left: 15%; width: 6px; height: 4px; background: #a07050; animation-delay: 0s; }
    .debris.active .debris-p:nth-child(2) { left: 35%; width: 4px; height: 3px; background: #b08060; animation-delay: 0.08s; }
    .debris.active .debris-p:nth-child(3) { left: 55%; width: 5px; height: 4px; background: #987050; animation-delay: 0.15s; }
    .debris.active .debris-p:nth-child(4) { left: 25%; width: 3px; height: 3px; background: #a87858; animation-delay: 0.12s; }
    .debris.active .debris-p:nth-child(5) { left: 68%; width: 5px; height: 3px; background: #906848; animation-delay: 0.22s; }
    .debris.active .debris-p:nth-child(6) { left: 45%; width: 4px; height: 4px; background: #b08858; animation-delay: 0.05s; }
    .debris.active .debris-p:nth-child(7) { left: 75%; width: 3px; height: 3px; background: #987050; animation-delay: 0.18s; }
    .debris.active .debris-p:nth-child(8) { left: 10%; width: 4px; height: 3px; background: #a07848; animation-delay: 0.1s; }
    @keyframes debris-fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
      8%   { opacity: 0.9; }
      100% { transform: translateY(140px) rotate(200deg); opacity: 0; }
    }

    /* ═══════════════════════════════════════
       LOWERING SYSTEM (ropes + mat + man)
       ═══════════════════════════════════════ */
    .lower-system {
      position: absolute;
      top: 17%;
      left: 50%;
      transform: translateX(-50%) scale(var(--s));
      transform-origin: top center;
      width: 82px;
      height: 0;
      z-index: 5;
      opacity: 0;
      transition: height 2.2s var(--ease), opacity 0.7s ease;
      pointer-events: none;
    }
    .lower-system.lowering {
      opacity: 1;
      height: 68%;
    }

    /* Ropes */
    .rope {
      position: absolute;
      top: 0;
      bottom: 18px;
      width: 2px;
      background: repeating-linear-gradient(180deg,
        #a08060, #a08060 4px, #b89068 4px, #b89068 8px
      );
    }
    .rope-l { left: 8px; }
    .rope-r { right: 8px; }

    /* Mat (stretcher) */
    .mat {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 74px;
      height: 16px;
      background: linear-gradient(90deg, #c89858, #d4a868, #c89858);
      border-radius: 3px;
      border: 1px solid rgba(160, 120, 60, 0.25);
    }
    .mat::before {
      content: "";
      position: absolute;
      inset: 2px;
      background: repeating-linear-gradient(0deg,
        rgba(0,0,0,0.04) 0 1px, transparent 1px 6px
      );
      border-radius: 2px;
    }

    /* Lying figure on mat */
    .lying-man {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 54px;
      height: 14px;
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .lm-head {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #f0d4aa, #d4b88a);
      flex-shrink: 0;
    }
    .lm-body {
      flex: 1;
      height: 10px;
      background: linear-gradient(90deg, #7090a8, #5a7a90);
      border-radius: 5px;
    }
    .lm-legs {
      width: 10px;
      height: 10px;
      background: linear-gradient(90deg, #5a7a90, #4a6a80);
      border-radius: 0 5px 5px 0;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════
       HEALED MAN (standing, step 3)
       ═══════════════════════════════════════ */
    .healed-man {
      position: absolute;
      bottom: 13%;
      left: 50%;
      transform: translateX(-50%) scale(var(--s));
      transform-origin: bottom center;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.9s ease 0.6s, transform 0.9s var(--ease) 0.6s;
      pointer-events: none;
    }
    .healed-man.visible {
      opacity: 1;
    }
    .hm-head {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #f0d4aa, #d4b88a);
      position: relative;
      z-index: 1;
    }
    .hm-body {
      width: 34px;
      height: 48px;
      margin-top: 2px;
      border-radius: 14px 14px 8px 8px;
      background: linear-gradient(180deg, #7090a8, #5a7a90);
      position: relative;
    }
    .hm-arms {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 82px;
      height: 8px;
      pointer-events: none;
    }
    .hm-arm {
      position: absolute;
      top: 0;
      width: 22px;
      height: 7px;
      background: #f0d4aa;
      border-radius: 4px;
    }
    .hm-arm-l {
      left: 0;
      transform: rotate(-35deg);
      animation: arm-joy-l 1.2s ease-in-out infinite;
    }
    .hm-arm-r {
      right: 0;
      transform: rotate(35deg);
      animation: arm-joy-r 1.2s ease-in-out infinite;
    }
    @keyframes arm-joy-l {
      0%   { transform: rotate(-35deg); }
      50%  { transform: rotate(-55deg); }
      100% { transform: rotate(-35deg); }
    }
    @keyframes arm-joy-r {
      0%   { transform: rotate(35deg); }
      50%  { transform: rotate(55deg); }
      100% { transform: rotate(35deg); }
    }

    /* Joy burst */
    .joy-burst {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 200, 100, 0.28), transparent 60%);
      opacity: 0;
      pointer-events: none;
    }
    .healed-man.visible .joy-burst {
      opacity: 1;
      animation: joy-pulse 1.8s ease-in-out infinite;
    }
    @keyframes joy-pulse {
      0%   { transform: translate(-50%, -50%) scale(0.8); }
      50%  { transform: translate(-50%, -50%) scale(1.3); }
      100% { transform: translate(-50%, -50%) scale(0.8); }
    }

    /* Floor mat (left behind) */
    .floor-mat {
      position: absolute;
      bottom: 11%;
      left: 50%;
      transform: translateX(-50%);
      width: 68px;
      height: 8px;
      background: linear-gradient(90deg, #c89858, #d4a868, #c89858);
      border-radius: 2px;
      border: 1px solid rgba(160, 120, 60, 0.2);
      z-index: 4;
      opacity: 0;
      transition: opacity 0.6s ease 0.4s;
      pointer-events: none;
    }
    .floor-mat.visible { opacity: 0.7; }

    /* ── Healing glow ── */
    .heal-glow {
      position: absolute;
      bottom: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 220, 130, 0.3), transparent 60%);
      opacity: 0;
      transition: opacity 1s ease;
      pointer-events: none;
      z-index: 4;
    }
    .heal-glow.active {
      opacity: 1;
      animation: heal-breathe 2s ease-in-out infinite alternate;
    }
    @keyframes heal-breathe {
      0%   { opacity: 0.5; transform: translateX(-50%) scale(0.9); }
      100% { opacity: 1; transform: translateX(-50%) scale(1.25); }
    }

    /* ═══════════════════════════════════════
       CELEBRATION
       ═══════════════════════════════════════ */
    .celebration {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 7;
      overflow: hidden;
    }
    .celebration span {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      opacity: 0;
    }
    .celebration.active span { animation: confetti 3s ease-out infinite; }
    .celebration span:nth-child(1)  { left: 18%; background: #ffcb6b; animation-delay: 0s; }
    .celebration span:nth-child(2)  { left: 26%; background: #7ab8e0; animation-delay: 0.25s; }
    .celebration span:nth-child(3)  { left: 34%; background: #a8d5a2; animation-delay: 0.5s; }
    .celebration span:nth-child(4)  { left: 46%; background: #d9b3e8; animation-delay: 0.75s; }
    .celebration span:nth-child(5)  { left: 55%; background: #e87a7a; animation-delay: 1s; }
    .celebration span:nth-child(6)  { left: 64%; background: #ffcb6b; animation-delay: 1.25s; }
    .celebration span:nth-child(7)  { left: 74%; background: #7ab8e0; animation-delay: 1.5s; }
    .celebration span:nth-child(8)  { left: 42%; background: #a8d5a2; animation-delay: 1.75s; }
    .celebration span:nth-child(9)  { left: 30%; background: #e87a7a; animation-delay: 0.4s; }
    .celebration span:nth-child(10) { left: 60%; background: #d9b3e8; animation-delay: 0.65s; }
    @keyframes confetti {
      0%   { top: -5%; transform: rotate(0deg) scale(1); opacity: 0; }
      10%  { opacity: 0.9; }
      100% { top: 105%; transform: rotate(720deg) scale(0.4); opacity: 0; }
    }

    /* ── Scripture ── */
    .scripture {
      position: absolute;
      top: 3%;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      text-align: center;
      font-size: clamp(0.56rem, 1.1vw, 0.78rem);
      font-weight: 700;
      color: rgba(80, 40, 10, 0.92);
      line-height: 1.5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
      max-width: 80%;
      z-index: 8;
      background: rgba(255, 248, 230, 0.9);
      padding: 8px 16px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .scripture.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Progress ── */
    .progress {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .progress-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(160, 69, 27, 0.3);
      background: transparent;
      transition: all 0.35s var(--ease);
    }
    .progress-dot.active {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(1.15);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    /* ── Controls ── */
    .controls {
      background: rgba(160, 69, 27, 0.06);
      border: 1px solid rgba(160, 69, 27, 0.08);
      border-radius: var(--radius-md);
      padding: clamp(8px, 1.5vh, 18px) clamp(12px, 2vw, 20px);
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: clamp(6px, 1vh, 12px);
      flex-shrink: 0;
    }
    .controls p {
      color: #4c2f1c;
      line-height: 1.45;
      font-size: clamp(0.78rem, 1.3vw, 0.95rem);
      min-height: 2.4em;
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: clamp(8px, 1.2vh, 12px) clamp(18px, 3vw, 32px);
      font-family: inherit;
      font-size: clamp(0.82rem, 1.2vw, 1rem);
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: var(--accent);
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s, background 0.3s;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button:not(:disabled):hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      background: var(--accent-light);
    }
    button:not(:disabled):active { transform: translateY(0); }

    /* ═══ SHORT VIEWPORTS ═══ */
    @media (max-height: 680px) {
      header p { display: none; }
      .controls p { min-height: 0; }
      .dist-bldgs { display: none; }
    }

    /* ═══ MOBILE ═══ */
    @media (max-width: 720px) {
      body {
        height: auto;
        min-height: 100dvh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      main {
        height: auto;
        max-height: none;
        overflow: visible;
        gap: 14px;
        padding: 16px;
      }
      .scene {
        flex: 0 0 auto;
        aspect-ratio: 4 / 3;
        min-height: 260px;
        max-height: 400px;
      }
      .dist-bldgs { display: none; }
      .window { display: none; }
      .scripture { max-width: 92%; font-size: 0.56rem; }
      .cf:nth-child(n+4) { display: none; }
      button { width: 100%; }
    }

    @media (max-width: 400px) {
      .scene { aspect-ratio: 1 / 1; min-height: 240px; }
      header h1 { font-size: 1.1rem; }
      .cf:nth-child(n+3) { display: none; }
    }
  </style>
</head>
<body>

        <button id="resetBtn">Reset Scene</button>
      </div>

  </main>

  <script>
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    const els = {
      scene:        $(".scene"),
      jesusEl:      $("#jesusEl"),
      roofL:        $("#roofL"),
      roofR:        $("#roofR"),
      roofFriends:  $("#roofFriends"),
      lightBeam:    $("#lightBeam"),
      dust:         $("#dust"),
      debris:       $("#debris"),
      lowerSystem:  $("#lowerSystem"),
      healedMan:    $("#healedMan"),
      floorMat:     $("#floorMat"),
      healGlow:     $("#healGlow"),
      crowd:        $("#crowd"),
      celebration:  $("#celebration"),
      scripture:    $("#scripture"),
      dots:         $$(".progress-dot"),
      stepBtn:      $("#stepBtn"),
      resetBtn:     $("#resetBtn"),
      status:       $("#status"),
    };

    const MAX = 3;

    const MESSAGES = [
      "The house in Capernaum is packed! Jesus is teaching inside, but the crowd is so thick that four friends carrying their paralyzed friend cannot get through the door. \uD83C\uDFE0",
      "Step 1 of 3 \u2014 The friends won\u2019t give up! They climb onto the roof and dig an opening right through it! \uD83D\uDCAA",
      "Step 2 of 3 \u2014 Using ropes, they carefully lower their friend on his mat through the roof, right down to Jesus! \uD83E\uDE62",
      "Step 3 of 3 \u2014 Jesus says \u201CGet up, take your mat, and walk!\u201D The man stands up — completely healed! \uD83E\uDDE1\uD83C\uDF89",
    ];

    let step = 0;

    function scaleScene() {
      if (!els.scene) return;
      const h = els.scene.clientHeight;
      const s = Math.min(1, h / 480);
      els.scene.style.setProperty("--s", s);
    }

    function render() {
      const atPeak = step >= MAX;

      /* Step 1+: Roof opens, friends appear, light, debris */
      els.roofL.classList.toggle("open", step >= 1);
      els.roofR.classList.toggle("open", step >= 1);
      els.roofFriends.classList.toggle("visible", step >= 1);
      els.lightBeam.classList.toggle("active", step >= 1);
      els.dust.classList.toggle("active", step >= 1);
      els.debris.classList.toggle("active", step === 1);

      /* Step 2+: Friends lean, mat lowers */
      els.roofFriends.classList.toggle("leaning", step >= 2);
      els.lowerSystem.classList.toggle("lowering", step >= 2 && !atPeak);

      /* Step 3: Jesus speaks, man healed */
      els.jesusEl.classList.toggle("speaking", atPeak);
      els.healGlow.classList.toggle("active", atPeak);
      els.healedMan.classList.toggle("visible", atPeak);
      els.floorMat.classList.toggle("visible", atPeak);
      els.crowd.classList.toggle("amazed", atPeak);
      els.celebration.classList.toggle("active", atPeak);
      els.scripture.classList.toggle("show", atPeak);

      /* Hide lowering system at step 3 */
      if (atPeak) {
        els.lowerSystem.style.opacity = "0";
        els.lowerSystem.classList.remove("lowering");
      }

      /* Progress dots */
      els.dots.forEach((d, i) => d.classList.toggle("active", i < step));

      /* Status text */
      els.status.textContent = MESSAGES[step];

      /* Button */
      els.stepBtn.disabled = atPeak;

      if (atPeak) chapterComplete();
    }

    els.stepBtn.addEventListener("click", () => {
      if (step < MAX) { step++; render(); }
    });

    els.resetBtn.addEventListener("click", () => {
      step = 0;
      chapterTriggered = false;

      els.roofL.classList.remove("open");
      els.roofR.classList.remove("open");
      els.roofFriends.classList.remove("visible", "leaning");
      els.lightBeam.classList.remove("active");
      els.dust.classList.remove("active");
      els.debris.classList.remove("active");
      els.lowerSystem.classList.remove("lowering");
      els.lowerSystem.style.opacity = "";
      els.jesusEl.classList.remove("speaking");
      els.healGlow.classList.remove("active");
      els.healedMan.classList.remove("visible");
      els.floorMat.classList.remove("visible");
      els.crowd.classList.remove("amazed");
      els.celebration.classList.remove("active");
      els.scripture.classList.remove("show");

      document.getElementById('chapterOverlay').style.opacity = '0';
      document.getElementById('chapterOverlay').style.pointerEvents = 'none';
      document.getElementById('chapterCard').style.transform = 'scale(.8)';

      render();
      els.stepBtn.focus();
    });

    window.addEventListener("resize", scaleScene);
    scaleScene();
    render();
  </script>

  <!-- ═══ CHAPTER TRANSITION OVERLAY ═══ -->
  <div id="chapterOverlay" style="
    position:fixed; inset:0; z-index:9999;

  ">

      max-width:88vw; width:360px;
      transform:scale(.8);
      transition:transform .5s cubic-bezier(.34,1.56,.64,1);
    ">

      <p id="ovDone" style="color:#2a5a7a;font-size:.9rem;margin:0 0 6px;line-height:1.4;"></p>
      <p id="ovNext" style="color:#3a6a8a;font-size:.82rem;font-weight:600;margin:0 0 18px;"></p>
      <button id="ovBtn" style="
        border:none; border-radius:999px;

        color:#1b5e3a; font-family:'Nunito',sans-serif;
        font-size:1rem; font-weight:700;
        padding:12px 28px; cursor:pointer;
        box-shadow:0 4px 14px rgba(85,200,155,.3);
        transition:transform .15s,box-shadow .2s;
      " onmouseover="this.style.transform='translateY(-2px)'"
         onmouseout="this.style.transform='none'"
      >Continue →</button>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════════
    // ★ CHAPTER 15 → CHAPTER 16 CONNECTION
    // ════════════════════════════════════════════
    const THIS_CHAPTER   = 15;
    const CHAPTER_DONE   = "Jesus healed because of the faith of caring friends \u2014 He loves when we help each other and believes in the power of community! \uD83E\uDDE1";
    const NEXT_FILE      = "indexjesus16.html";
    // ════════════════════════════════════════════

    const CHAPTER_TITLES = [
      "",                                       //  0
      "Gabriel Visits Mary",                    //  1
      "Journey to Bethlehem",                   //  2
      "No Room at the Inn",                     //  3
      "Jesus Is Born",                          //  4
      "Angels Tell the Shepherds",              //  5
      "Shepherds Visit Jesus",                  //  6
      "The Wise Men Follow the Star",           //  7
      "Gifts for the King",                     //  8
      "The Escape to Egypt",                    //  9
      "First Miracle at Cana",                  // 10
      "Jesus Cleans God\u2019s House",          // 11
      "Jesus and Nicodemus",                    // 12
      "Healing the Official\u2019s Son",        // 13
      "The Great Catch of Fish",                // 14
      "Healing the Paralyzed Man",              // 15
      "Jesus Calms the Storm"                   // 16
    ];

    let chapterTriggered = false;

    function chapterComplete() {
      if (chapterTriggered) return;
      chapterTriggered = true;

      const ov   = document.getElementById('chapterOverlay');
      const card = document.getElementById('chapterCard');
      const nextChapter = THIS_CHAPTER + 1;
      const isLast = !NEXT_FILE;

      document.getElementById('ovTitle').textContent = isLast
        ? '\uD83C\uDF1F The Story Complete!'
        : `\u2728 Chapter ${THIS_CHAPTER} Complete!`;

      document.getElementById('ovDone').textContent = CHAPTER_DONE;

      document.getElementById('ovNext').textContent = isLast
        ? 'You journeyed through the whole story!'
        : `Next: Chapter ${nextChapter} \u2014 ${CHAPTER_TITLES[nextChapter] || ''}`;

      const btn = document.getElementById('ovBtn');
      btn.textContent = isLast ? '\uD83D\uDD04 Play Again' : 'Continue \u2192';
      btn.onclick = () => {
        window.location.href = isLast ? 'indexjesus1.html' : NEXT_FILE;
      };

      setTimeout(() => {
        ov.style.opacity = '1';
        ov.style.pointerEvents = 'auto';
        card.style.transform = 'scale(1)';
      }, 1500);
    }
  </script>
</body>
</html>
