<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Level 3 – The Birth of Jesus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      color-scheme: only light;
      --font-main: "Nunito", "Segoe UI", system-ui, sans-serif;
      --clr-gold: #f6d686;
      --clr-gold-dark: #c9a035;
      --clr-gold-light: #ffe8a3;
      --clr-sky-dark: #0c1425;
      --clr-sky-mid: #192544;
      --clr-wood-dark: #3c2b1b;
      --clr-wood-mid: #5e462f;
      --clr-card: rgba(9, 14, 24, 0.92);
      --clr-text: #f4f6ff;
      --clr-text-muted: #cfd8ff;
      --radius-card: 22px;
      --radius-pill: 999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      background: radial-gradient(circle at top, var(--clr-sky-mid) 0%, var(--clr-sky-dark) 55%, #06090f 100%);
      color: var(--clr-text);
      overflow-x: hidden;
    }

    .scene {
      width: min(96vw, 700px);
      background: var(--clr-card);
      border-radius: var(--radius-card);
      padding: clamp(14px, 3vw, 28px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeInUp 0.6s ease-out;
      max-height: 96vh;
      overflow-y: auto;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header { text-align: center; }

    header h1 {
      font-size: clamp(1.2rem, 3.5vw, 1.7rem);
      font-weight: 800;
      color: var(--clr-gold);
      line-height: 1.2;
    }

    header p {
      margin: 4px 0 0;
      color: var(--clr-text-muted);
      font-size: clamp(0.78rem, 2vw, 0.9rem);
      line-height: 1.4;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--clr-gold), #ff9f52);
      border-radius: 8px;
      transition: width 0.6s ease;
    }

    .stable {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      min-height: 200px;
      max-height: 340px;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, #1b2847 0%, #253454 46%, var(--clr-wood-mid) 47%, var(--clr-wood-dark) 100%);
      box-shadow: inset 0 -25px 50px rgba(0, 0, 0, 0.45);
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle ease-in-out infinite;
      z-index: 1;
    }

    .star:nth-child(1)  { top: 8%;  left: 12%; animation-duration: 2.6s; }
    .star:nth-child(2)  { top: 14%; left: 28%; animation-duration: 3.1s; animation-delay: 0.4s; }
    .star:nth-child(3)  { top: 5%;  left: 42%; animation-duration: 2.9s; animation-delay: 0.9s; }
    .star:nth-child(4)  { top: 18%; left: 56%; animation-duration: 3.4s; animation-delay: 0.2s; }
    .star:nth-child(5)  { top: 7%;  left: 72%; animation-duration: 2.3s; animation-delay: 1.1s; }
    .star:nth-child(6)  { top: 12%; left: 88%; animation-duration: 3.0s; animation-delay: 0.7s; }
    .star:nth-child(7)  { top: 22%; left: 20%; animation-duration: 2.7s; animation-delay: 1.3s; }
    .star:nth-child(8)  { top: 3%;  left: 65%; animation-duration: 3.3s; animation-delay: 0.5s; }
    .star:nth-child(9)  { top: 16%; left: 80%; animation-duration: 2.5s; animation-delay: 1.0s; }
    .star:nth-child(10) { top: 10%; left: 50%; animation-duration: 3.2s; animation-delay: 0.3s; }
    .star:nth-child(11) { top: 20%; left: 35%; animation-duration: 2.8s; animation-delay: 0.8s; }
    .star:nth-child(12) { top: 4%;  left: 95%; animation-duration: 3.5s; animation-delay: 1.5s; }

    @keyframes twinkle {
      0%, 100% { opacity: 0.25; transform: scale(0.7); }
      50%      { opacity: 1;    transform: scale(1.4); }
    }

    .barn-frame {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .barn-roof {
      position: absolute;
      top: -30px;
      left: 50%;
      width: 120%;
      height: 110px;
      transform: translateX(-50%) skewX(-6deg);
      background: linear-gradient(180deg, #462f1a, #2c1c10);
      box-shadow: 0 18px 35px rgba(0, 0, 0, 0.5);
      border-radius: 0 0 30px 30px;
    }

    .barn-beam {
      position: absolute;
      width: 12px;
      top: 50px;
      bottom: 0;
      background: linear-gradient(180deg, #563820, #36210f);
      border-radius: 6px;
    }

    .barn-beam.left   { left: 12%; }
    .barn-beam.center { left: 50%; transform: translateX(-50%); }
    .barn-beam.right  { right: 12%; }

    .hay-floor {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 38%;
      background: linear-gradient(180deg, rgba(249, 212, 121, 0.35), rgba(128, 92, 45, 0.95));
    }

    .speech-bubble {
      position: absolute;
      top: 5%;
      left: 50%;
      transform: translateX(-50%) scale(0);
      background: rgba(255, 255, 255, 0.95);
      border-radius: 14px;
      padding: 8px 14px;
      font-size: clamp(0.7rem, 1.8vw, 0.82rem);
      font-weight: 700;
      color: #2a1c11;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      z-index: 15;
      opacity: 0;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
      text-align: center;
      max-width: 80%;
      pointer-events: none;
    }

    .speech-bubble::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: rgba(255, 255, 255, 0.95);
    }

    .speech-bubble.is-visible {
      transform: translateX(-50%) scale(1);
      opacity: 1;
    }

    .confetti-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
      overflow: hidden;
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      opacity: 0;
    }

    .confetti.is-active {
      animation: confettiFall 2.2s ease-out forwards;
    }

    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translateY(250px) rotate(720deg) scale(0.2); }
    }

    .light-rays {
      position: absolute;
      bottom: 20%;
      left: 50%;
      width: 220px;
      height: 220px;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .light-rays.is-visible {
      opacity: 1;
    }

    .light-ray {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 3px;
      height: 90px;
      background: linear-gradient(180deg, rgba(255, 244, 200, 0.6), transparent);
      transform-origin: bottom center;
      border-radius: 2px;
      animation: rayPulse 3s ease-in-out infinite;
    }

    .light-ray:nth-child(1)  { transform: translate(-50%, -100%) rotate(0deg);   animation-delay: 0s; }
    .light-ray:nth-child(2)  { transform: translate(-50%, -100%) rotate(30deg);  animation-delay: 0.2s; }
    .light-ray:nth-child(3)  { transform: translate(-50%, -100%) rotate(60deg);  animation-delay: 0.4s; }
    .light-ray:nth-child(4)  { transform: translate(-50%, -100%) rotate(90deg);  animation-delay: 0.6s; }
    .light-ray:nth-child(5)  { transform: translate(-50%, -100%) rotate(120deg); animation-delay: 0.8s; }
    .light-ray:nth-child(6)  { transform: translate(-50%, -100%) rotate(150deg); animation-delay: 1.0s; }
    .light-ray:nth-child(7)  { transform: translate(-50%, -100%) rotate(180deg); animation-delay: 0.1s; }
    .light-ray:nth-child(8)  { transform: translate(-50%, -100%) rotate(210deg); animation-delay: 0.3s; }
    .light-ray:nth-child(9)  { transform: translate(-50%, -100%) rotate(240deg); animation-delay: 0.5s; }
    .light-ray:nth-child(10) { transform: translate(-50%, -100%) rotate(270deg); animation-delay: 0.7s; }
    .light-ray:nth-child(11) { transform: translate(-50%, -100%) rotate(300deg); animation-delay: 0.9s; }
    .light-ray:nth-child(12) { transform: translate(-50%, -100%) rotate(330deg); animation-delay: 1.1s; }

    @keyframes rayPulse {
      0%, 100% { opacity: 0.4; }
      50%      { opacity: 1; }
    }

    /* ── ANGEL (scaled down) ── */
    .angel {
      position: absolute;
      top: 16%;
      left: 50%;
      width: 110px;
      height: 110px;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: float 5s ease-in-out infinite;
      z-index: 5;
    }

    .angel-glow {
      position: absolute;
      inset: -35px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 245, 205, 0.4), transparent 70%);
      z-index: -1;
      pointer-events: none;
    }

    .angel-halo {
      width: 58px;
      height: 58px;
      border: 3px solid rgba(255, 239, 180, 0.9);
      border-radius: 50%;
      margin-bottom: -22px;
      box-shadow: 0 0 18px rgba(255, 239, 180, 0.5);
      animation: haloGlow 3s ease-in-out infinite;
    }

    @keyframes haloGlow {
      0%, 100% { box-shadow: 0 0 12px rgba(255, 239, 180, 0.4); }
      50%      { box-shadow: 0 0 28px rgba(255, 239, 180, 0.9); }
    }

    .angel-head {
      width: 36px;
      height: 36px;
      background: #fdd9b5;
      border-radius: 50%;
      box-shadow: inset 0 -3px 0 rgba(205, 140, 100, 0.2);
      position: relative;
      z-index: 2;
    }

    .angel-eyes {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 9px;
    }

    .angel-eyes span {
      width: 5px;
      height: 6px;
      background: #4a2f24;
      border-radius: 50%;
      position: relative;
    }

    .angel-eyes span::after {
      content: "";
      position: absolute;
      top: 1px;
      right: 1px;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
    }

    .angel-smile {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 5px;
      border: 2px solid #c47a5c;
      border-top: none;
      border-radius: 0 0 10px 10px;
    }

    .angel-body {
      width: 58px;
      height: 70px;
      border-radius: 30px 30px 18px 18px;
      background: linear-gradient(180deg, #fffdf6, #ece8d8);
      border: 2px solid rgba(255, 255, 255, 0.6);
      position: relative;
      margin-top: -6px;
    }

    .angel-wing {
      position: absolute;
      width: 72px;
      height: 40px;
      background: rgba(255, 255, 255, 0.82);
      border-radius: 50%;
      top: 8px;
      filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.25));
      transition: transform 0.3s ease;
    }

    .angel-wing.left  { left: -52px; transform: rotate(-12deg); }
    .angel-wing.right { right: -52px; transform: rotate(12deg); }

    .angel.is-rejoicing .angel-wing.left  { animation: aWingL 0.4s ease-in-out 3; }
    .angel.is-rejoicing .angel-wing.right { animation: aWingR 0.4s ease-in-out 3; }

    @keyframes aWingL {
      0%, 100% { transform: rotate(-12deg); }
      50%      { transform: rotate(-28deg); }
    }
    @keyframes aWingR {
      0%, 100% { transform: rotate(12deg); }
      50%      { transform: rotate(28deg); }
    }

    @keyframes float {
      0%, 100% { transform: translate(-50%, -50%) translateY(-5px); }
      50%      { transform: translate(-50%, -50%) translateY(8px); }
    }

    /* ── HOLY FAMILY (scaled via wrapper) ── */
    .holy-family {
      position: absolute;
      bottom: 6%;
      left: 50%;
      width: 90%;
      transform: translateX(-50%) scale(0.7);
      transform-origin: bottom center;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 8px;
      z-index: 4;
    }

    .figure {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
    }

    .face {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #f8d7b6;
      position: relative;
      box-shadow: inset 0 -6px 0 rgba(201, 138, 96, 0.3);
    }

    .face::after {
      content: "";
      position: absolute;
      top: 22px;
      left: 50%;
      width: 22px;
      height: 8px;
      margin-left: -11px;
      border-bottom: 3px solid rgba(74, 47, 36, 0.8);
      border-radius: 50%;
    }

    .eye {
      position: absolute;
      top: 18px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2f1d12;
    }

    .eye.left  { left: 16px; }
    .eye.right { right: 16px; }

    .eye::after {
      content: "";
      position: absolute;
      top: 2px;
      right: 2px;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
    }

    .nose {
      position: absolute;
      top: 28px;
      left: 50%;
      width: 6px;
      height: 10px;
      margin-left: -3px;
      border-radius: 3px;
      background: rgba(196, 128, 88, 0.8);
    }

    .mary-veil {
      width: 92px;
      height: 92px;
      background: linear-gradient(180deg, rgba(182, 210, 255, 0.95), rgba(89, 126, 201, 0.9));
      border-radius: 48px 48px 65px 65px;
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      z-index: -1;
    }

    .mary-body {
      width: 78px;
      height: 118px;
      border-radius: 38px 38px 24px 24px;
      background: linear-gradient(180deg, #6da8ff, #365cb8);
      border: 3px solid rgba(255, 255, 255, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mary-body .bump {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
    }

    .joseph-headband {
      position: absolute;
      top: 8px;
      left: 50%;
      width: 60px;
      height: 16px;
      margin-left: -30px;
      border-radius: 8px;
      background: #6d4c2f;
    }

    .joseph-body {
      width: 86px;
      height: 130px;
      border-radius: 42px 42px 24px 24px;
      background: linear-gradient(180deg, #c69b79, #8b5d39);
      border: 3px solid rgba(255, 255, 255, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .joseph-robe-panels {
      position: absolute;
      width: 48px;
      height: 90px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.15);
    }

    .staff {
      width: 12px;
      height: 150px;
      background: linear-gradient(180deg, #8a6038, #482b17);
      border-radius: 6px;
      margin-top: 12px;
    }

    .animal {
      width: 110px;
      height: 130px;
      position: relative;
    }

    .animal-body {
      width: 105px;
      height: 70px;
      border-radius: 50px;
      background: var(--coat, #8b7765);
      position: absolute;
      bottom: 30px;
      left: 2px;
    }

    .animal-head {
      width: 55px;
      height: 48px;
      border-radius: 45px;
      background: var(--coat, #8b7765);
      position: absolute;
      left: var(--head-left, -8px);
      bottom: 78px;
    }

    .animal-ear {
      width: 16px;
      height: 26px;
      border-radius: 50% 50% 10px 10px;
      background: var(--ear, #a88f78);
      position: absolute;
      top: -16px;
      transition: transform 0.3s ease;
    }

    .animal-ear.left  { left: 6px; }
    .animal-ear.right { right: 6px; }

    .animal-eye {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #2f1d12;
      position: absolute;
      top: 16px;
      left: 24px;
    }

    .animal-eye::after {
      content: "";
      position: absolute;
      top: 1px;
      right: 1px;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
    }

    .animal-leg {
      width: 14px;
      height: 44px;
      border-radius: 6px;
      background: var(--coat, #8b7765);
      position: absolute;
      bottom: 0;
    }

    .animal-leg::after {
      content: "";
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 14px;
      height: 10px;
      border-radius: 4px;
      background: #3b291c;
    }

    .animal-leg.one   { left: 10px; }
    .animal-leg.two   { left: 32px; }
    .animal-leg.three { right: 32px; }
    .animal-leg.four  { right: 10px; }

    .trough-wrapper {
      position: relative;
      width: 200px;
      height: 130px;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .trough {
      width: 160px;
      height: 70px;
      transform: perspective(500px) rotateX(35deg);
      transform-origin: center;
      background: linear-gradient(180deg, #5f3c19, #3a250f);
      border-radius: 24px;
      box-shadow: 0 18px 30px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: visible;
    }

    .trough::before {
      content: "";
      position: absolute;
      inset: 10px 14px 14px;
      border-radius: 18px;
      background: radial-gradient(circle at top, rgba(255, 233, 168, 0.95), rgba(210, 156, 70, 0.95));
    }

    .trough-legs {
      position: absolute;
      width: 180px;
      height: 30px;
      bottom: 10px;
      display: flex;
      justify-content: space-between;
    }

    .trough-leg {
      width: 24px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(180deg, #3c2410, #241308);
      box-shadow: 0 6px 10px rgba(0, 0, 0, 0.4);
    }

    .baby {
      position: absolute;
      top: -10px;
      left: 50%;
      width: 120px;
      height: 70px;
      transform: translate(-50%, -10px) scale(0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .baby-head {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #f8dcc2;
      position: relative;
      box-shadow: inset 0 -4px 0 rgba(188, 134, 97, 0.3);
    }

    .baby-head .eye {
      width: 8px;
      height: 8px;
      top: 18px;
      background: #2f1d12;
    }

    .baby-head .smile {
      position: absolute;
      top: 26px;
      left: 50%;
      width: 16px;
      height: 8px;
      margin-left: -8px;
      border-bottom: 3px solid rgba(74, 47, 36, 0.8);
      border-radius: 50%;
    }

    .swaddle {
      width: 120px;
      height: 38px;
      border-radius: 22px;
      background: linear-gradient(90deg, #f8f7f1, #dfdbce);
      border: 2px solid rgba(255, 255, 255, 0.65);
    }

    .baby-glow {
      position: absolute;
      inset: -50px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 244, 200, 0.6), transparent 70%);
      opacity: 0;
      transition: opacity 1s ease;
      z-index: -1;
      pointer-events: none;
    }

    .baby.revealed {
      opacity: 1;
      transform: translate(-50%, -22px) scale(1);
    }

    .baby.revealed ~ .baby-glow {
      opacity: 1;
    }

    .progress-hints {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .progress-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(247, 214, 133, 0.5);
      background: transparent;
      transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    }

    .progress-dot.active {
      background: var(--clr-gold);
      border-color: var(--clr-gold);
      box-shadow: 0 0 8px rgba(246, 214, 134, 0.6);
    }

    .instructions {
      margin: 0;
      text-align: center;
      color: #d7e0ff;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: clamp(0.8rem, 2vw, 0.92rem);
      font-weight: 600;
      transition: background 0.4s ease, color 0.4s ease;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.4;
    }

    .instructions.is-done {
      background: rgba(76, 175, 80, 0.2);
      color: #a5d6a7;
    }

    .step-counter {
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--clr-gold-dark);
      opacity: 0.7;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .tap-btn {
      flex: 1;
      max-width: 260px;
      border: none;
      border-radius: var(--radius-pill);
      padding: 11px 22px;
      font-family: var(--font-main);
      font-size: 0.95rem;
      font-weight: 700;
      background: linear-gradient(90deg, #ffd47d, #ff9f52);
      color: #4a2a0e;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.3s ease;
      box-shadow: 0 4px 14px rgba(255, 159, 82, 0.35);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .tap-btn:hover:not(:disabled) {
      box-shadow: 0 6px 22px rgba(255, 159, 82, 0.55);
      transform: translateY(-2px);
    }

    .tap-btn:active:not(:disabled) {
      transform: scale(0.97) translateY(0);
      box-shadow: 0 2px 8px rgba(255, 159, 82, 0.3);
    }

    .tap-btn:disabled {
      opacity: 0.55;
      cursor: default;
      box-shadow: none;
    }

    .tap-btn:focus-visible {
      outline: 3px solid var(--clr-gold);
      outline-offset: 3px;
    }

    .restart-btn {
      border: none;
      border-radius: var(--radius-pill);
      background: linear-gradient(90deg, #a8e6cf 0%, #55c89b 100%);
      color: #1b5e3a;
      font-family: var(--font-main);
      font-size: 0.92rem;
      font-weight: 700;
      padding: 11px 18px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 14px rgba(85, 200, 155, 0.3);
      display: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .restart-btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(85, 200, 155, 0.5); }
    .restart-btn:active { transform: scale(0.97); }
    .restart-btn:focus-visible { outline: 3px solid #55c89b; outline-offset: 3px; }
    .restart-btn.is-visible { display: block; }

    .tip {
      text-align: center;
      color: rgba(207, 216, 255, 0.55);
      font-size: 0.8rem;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      body { padding: 8px; }
      .scene { width: 100%; padding: 12px; gap: 10px; border-radius: 16px; }
      .stable { min-height: 180px; max-height: 240px; border-radius: 14px; }
      .barn-roof { height: 80px; }
      .barn-beam { width: 10px; top: 40px; }
      .holy-family { transform: translateX(-50%) scale(0.52); }
      .angel { width: 85px; height: 85px; top: 14%; }
      .angel-halo { width: 44px; height: 44px; margin-bottom: -16px; }
      .angel-head { width: 28px; height: 28px; }
      .angel-eyes span { width: 4px; height: 4px; }
      .angel-eyes { gap: 7px; top: 9px; }
      .angel-smile { width: 8px; height: 4px; bottom: 6px; }
      .angel-body { width: 44px; height: 54px; }
      .angel-wing { width: 55px; height: 30px; }
      .angel-wing.left { left: -38px; }
      .angel-wing.right { right: -38px; }
      .light-rays { width: 150px; height: 150px; }
      .light-ray { height: 60px; }
      .speech-bubble { font-size: 0.7rem; padding: 6px 10px; border-radius: 10px; }
      .controls { flex-direction: column; align-items: center; }
      .tap-btn, .restart-btn { width: 100%; max-width: 100%; }
    }

    @media (max-width: 420px) {
      .scene { padding: 10px; gap: 8px; }
      header h1 { font-size: 1.1rem; }
      .stable { min-height: 160px; max-height: 210px; }
      .holy-family { transform: translateX(-50%) scale(0.44); }
      .angel { top: 12%; }
    }

    @media (min-height: 800px) {
      .stable { max-height: 380px; }
    }
  </style>
</head>
<body>

    <p class="instructions" data-message>

      </button>

    <p class="tip">Tip: Press Space or tap three times to reveal baby Jesus.</p>

  <script>
    class LevelThreeGame {
      static CONFIG = {
        totalPresses: 3,
        messages: [
          "Press Space or tap the button three times to welcome Jesus into the manger.",
          "The stable holds its breath in wonder\u2026 \u2728",
          "One more press \u2014 the night is almost filled with joy! \uD83C\uDF1F",
          "Glory! Jesus rests safely in the manger. \uD83C\uDF89"
        ],
        speeches: [
          "",
          "Bethlehem holds its breath\u2026",
          "The moment draws near!",
          "For unto us a child is born!"
        ],
        animDuration: 600,
        confettiCount: 50,
        confettiColors: ["#ffd700", "#ff6b6b", "#48dbfb", "#ff9ff3", "#54a0ff", "#feca57", "#fff"]
      };

      constructor() {
        this.els = {
          baby:         document.querySelector("[data-baby]"),
          babyGlow:     document.querySelector("[data-baby-glow]"),
          angel:        document.querySelector("[data-angel]"),
          tapBtn:       document.querySelector("[data-tap]"),
          restartBtn:   document.querySelector("[data-restart]"),
          message:      document.querySelector("[data-message]"),
          speech:       document.querySelector("[data-speech]"),
          dots:         document.querySelectorAll(".progress-dot"),
          progressFill: document.querySelector("[data-progress]"),
          progressBar:  document.querySelector(".progress-track"),
          stepCounter:  document.querySelector("[data-step-counter]"),
          confetti:     document.querySelector("[data-confetti]"),
          lightRays:    document.querySelector("[data-rays]"),
        };

        this.presses = 0;
        this.isRevealed = false;
        this.isAnimating = false;

        this.#bindEvents();
        this.#render();
      }

      #bindEvents() {
        this.els.tapBtn.addEventListener("click", () => this.#handlePress());
        this.els.restartBtn.addEventListener("click", () => this.#reset());

        document.addEventListener("keydown", (e) => {
          if (e.code === "Space" || e.key === "Enter") {
            e.preventDefault();
            if (!this.els.tapBtn.disabled) this.#handlePress();
          }
        });
      }

      #handlePress() {
        const { totalPresses, animDuration } = LevelThreeGame.CONFIG;

        if (this.isRevealed || this.isAnimating) return;

        this.isAnimating = true;
        this.presses = Math.min(this.presses + 1, totalPresses);

        this.els.angel.classList.add("is-rejoicing");

        if (this.els.dots[this.presses - 1]) {
          this.els.dots[this.presses - 1].classList.add("active");
        }

        this.#render();
        this.#showSpeech(LevelThreeGame.CONFIG.speeches[this.presses]);

        if (this.presses >= totalPresses) {
          this.isRevealed = true;
          this.els.baby.classList.add("revealed");
          this.els.babyGlow.style.opacity = "1";
          this.els.lightRays.classList.add("is-visible");

          setTimeout(() => this.#spawnConfetti(), 400);

          this.els.tapBtn.disabled = true;
          this.els.tapBtn.textContent = "\uD83C\uDF1F Jesus Is Here!";
          this.els.message.classList.add("is-done");
          this.els.restartBtn.classList.add("is-visible");

          /* ── Chapter transition trigger ── */
          if (typeof chapterComplete === 'function') {
            chapterComplete();
          }
        }

        setTimeout(() => {
          this.els.angel.classList.remove("is-rejoicing");
          this.isAnimating = false;
        }, animDuration);
      }

      #render() {
        const { totalPresses, messages } = LevelThreeGame.CONFIG;

        this.els.message.textContent = messages[this.presses];

        const pct = (this.presses / totalPresses) * 100;
        this.els.progressFill.style.width = `${pct}%`;
        this.els.progressBar.setAttribute("aria-valuenow", this.presses);

        this.els.stepCounter.textContent = `Press ${this.presses} of ${totalPresses}`;
      }

      #showSpeech(text) {
        if (!text) return;
        this.els.speech.textContent = text;
        this.els.speech.classList.add("is-visible");

        setTimeout(() => {
          this.els.speech.classList.remove("is-visible");
        }, 3000);
      }

      #spawnConfetti() {
        const { confettiCount, confettiColors } = LevelThreeGame.CONFIG;
        const container = this.els.confetti;

        for (let i = 0; i < confettiCount; i++) {
          const piece = document.createElement("div");
          piece.classList.add("confetti");
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.top = `${Math.random() * 30}%`;
          piece.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
          piece.style.animationDelay = `${Math.random() * 0.8}s`;
          const size = `${5 + Math.random() * 8}px`;
          piece.style.width = size;
          piece.style.height = size;

          container.appendChild(piece);
          requestAnimationFrame(() => piece.classList.add("is-active"));
        }

        setTimeout(() => { container.innerHTML = ""; }, 4000);
      }

      #reset() {
        this.presses = 0;
        this.isRevealed = false;
        this.isAnimating = false;

        this.els.baby.classList.remove("revealed");
        this.els.babyGlow.style.opacity = "0";
        this.els.lightRays.classList.remove("is-visible");
        this.els.angel.classList.remove("is-rejoicing");
        this.els.dots.forEach((dot) => dot.classList.remove("active"));

        this.els.tapBtn.disabled = false;
        this.els.tapBtn.textContent = "\u2B50 Welcome the King";
        this.els.restartBtn.classList.remove("is-visible");
        this.els.message.classList.remove("is-done");
        this.els.speech.classList.remove("is-visible");
        this.els.confetti.innerHTML = "";

        /* ── Allow chapter transition to fire again ── */
        chapterTriggered = false;

        this.#render();
      }
    }

    document.addEventListener("DOMContentLoaded", () => new LevelThreeGame());
  </script>

  <!-- ═══ CHAPTER TRANSITION OVERLAY ═══ -->
  <div id="chapterOverlay" style="
    position:fixed; inset:0; z-index:9999;
    background:rgba(35,20,5,.6);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition:opacity .5s ease;
    font-family:'Nunito',sans-serif;
  ">
    <div id="chapterCard" style="
      background:#fff8ee; border-radius:24px;
      padding:clamp(24px,5vw,40px); text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.3);
      max-width:88vw; width:360px;
      transform:scale(.8);
      transition:transform .5s cubic-bezier(.34,1.56,.64,1);
    ">
      <h2 id="ovTitle" style="font-size:clamp(1.15rem,3.5vw,1.5rem);color:#5c3b1a;margin:0 0 8px;"></h2>
      <p id="ovDone" style="color:#8a5a21;font-size:.9rem;margin:0 0 6px;line-height:1.4;"></p>
      <p id="ovNext" style="color:#9c6c32;font-size:.82rem;font-weight:600;margin:0 0 18px;"></p>
      <button id="ovBtn" style="
        border:none; border-radius:999px;
        background:linear-gradient(90deg,#a8e6cf,#55c89b);
        color:#1b5e3a; font-family:'Nunito',sans-serif;
        font-size:1rem; font-weight:700;
        padding:12px 28px; cursor:pointer;
        box-shadow:0 4px 14px rgba(85,200,155,.3);
        transition:transform .15s,box-shadow .2s;
      " onmouseover="this.style.transform='translateY(-2px)'"
         onmouseout="this.style.transform='none'"
      >Continue →</button>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════════
    // ★ LEVEL 3 SETTINGS
    // ════════════════════════════════════════════
    const THIS_CHAPTER   = 3;
    const CHAPTER_DONE   = "Baby Jesus was born and laid gently in the manger — glory to God in the highest!";
    const NEXT_FILE      = "indexjesus4.html";
    // ════════════════════════════════════════════

    const CHAPTER_TITLES = [
      "",
      "Gabriel Visits Mary",
      "Journey to Bethlehem",
      "The Birth of Jesus",
      "Journey to Jerusalem",
      "Missing Jesus",
      "Back to Jerusalem",
      "Baptism in the Jordan",
      "Temptation in the Desert",
      "Jesus Begins His Ministry",
      "First Miracle at Cana"
    ];

    let chapterTriggered = false;

    function chapterComplete() {
      if (chapterTriggered) return;
      chapterTriggered = true;

      const ov   = document.getElementById('chapterOverlay');
      const card = document.getElementById('chapterCard');
      const nextChapter = THIS_CHAPTER + 1;
      const isLast = !NEXT_FILE;

      document.getElementById('ovTitle').textContent = isLast
        ? '🌟 The Christmas Story Complete!'
        : `✨ Chapter ${THIS_CHAPTER} Complete!`;

      document.getElementById('ovDone').textContent = CHAPTER_DONE;

      document.getElementById('ovNext').textContent = isLast
        ? 'You journeyed through the whole Christmas Story! 🎄'
        : `Next: Chapter ${nextChapter} — ${CHAPTER_TITLES[nextChapter] || ''}`;

      const btn = document.getElementById('ovBtn');
      btn.textContent = isLast ? '🔄 Play Again' : 'Continue →';
      btn.onclick = () => {
        window.location.href = isLast ? 'indexjesus1.html' : NEXT_FILE;
      };

      setTimeout(() => {
        ov.style.opacity = '1';
        ov.style.pointerEvents = 'auto';
        card.style.transform = 'scale(1)';
      }, 1800);
    }
  </script>
