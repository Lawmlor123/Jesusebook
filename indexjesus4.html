<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Level 4 – Journey to Jerusalem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      color-scheme: only light;
      --font-main: "Nunito", "Segoe UI", system-ui, sans-serif;
      --clr-gold: #ffe9a9;
      --clr-gold-dark: #c9a035;
      --clr-gold-light: #fff4d6;
      --clr-sky-dark: #0d1426;
      --clr-sky-mid: #1b2640;
      --clr-card: rgba(11, 16, 26, 0.92);
      --clr-text: #fdf7e8;
      --clr-text-muted: #d9e1ff;
      --clr-sand: #e7c07a;
      --radius-card: 22px;
      --radius-pill: 999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      background: radial-gradient(circle at top, var(--clr-sky-mid) 0%, var(--clr-sky-dark) 55%, #060a11 100%);
      color: var(--clr-text);
      overflow-x: hidden;
    }

    .scene {
      width: min(96vw, 700px);
      background: var(--clr-card);
      border-radius: var(--radius-card);
      padding: clamp(14px, 3vw, 28px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeInUp 0.6s ease-out;
      max-height: 96vh;
      overflow-y: auto;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header { text-align: center; }

    header h1 {
      font-size: clamp(1.2rem, 3.5vw, 1.7rem);
      font-weight: 800;
      color: var(--clr-gold);
      line-height: 1.2;
    }

    header p {
      margin: 4px 0 0;
      color: var(--clr-text-muted);
      font-size: clamp(0.78rem, 2vw, 0.9rem);
      line-height: 1.4;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--clr-gold), #ff9f52);
      border-radius: 8px;
      transition: width 0.8s ease;
    }

    .desert {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      min-height: 180px;
      max-height: 340px;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, #71a5ff 0%, #c5e2ff 32%, #f4dba0 33%, #e7c07a 65%, #c08b46 100%);
      box-shadow: inset 0 -25px 50px rgba(0, 0, 0, 0.45);
    }

    .sun {
      position: absolute;
      top: 10%;
      right: 14%;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff6c7 0%, #ffd55a 55%, transparent 70%);
      box-shadow: 0 0 50px rgba(255, 213, 90, 0.8);
      animation: sunPulse 4s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes sunPulse {
      0%, 100% { box-shadow: 0 0 40px rgba(255, 213, 90, 0.6); }
      50%      { box-shadow: 0 0 65px rgba(255, 213, 90, 1); }
    }

    .cloud {
      position: absolute;
      width: 80px;
      height: 26px;
      background: rgba(255, 255, 255, 0.88);
      border-radius: 16px;
      filter: blur(0.5px);
      animation: drift 28s linear infinite;
      z-index: 2;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: inherit;
      width: 48px;
      height: 26px;
      border-radius: 50%;
      top: -8px;
    }

    .cloud::before { left: -18px; }
    .cloud::after  { right: -18px; }

    .cloud.one   { left: 8%; top: 16%; animation-duration: 26s; }
    .cloud.two   { left: 52%; top: 18%; animation-duration: 30s; animation-delay: 5s; }
    .cloud.three { left: 28%; top: 8%;  animation-duration: 34s; animation-delay: 12s; }

    @keyframes drift {
      0%   { transform: translateX(-40px) translateY(0); }
      50%  { transform: translateX(40px) translateY(-3px); }
      100% { transform: translateX(-40px) translateY(0); }
    }

    .city {
      position: absolute;
      bottom: 42%;
      left: 52%;
      width: 180px;
      height: 70px;
      transform: translateX(-50%);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.1));
      clip-path: polygon(0% 70%, 10% 50%, 18% 70%, 26% 40%, 32% 70%, 40% 55%, 45% 70%, 55% 28%, 63% 70%, 72% 45%, 80% 70%, 88% 32%, 100% 70%, 100% 100%, 0% 100%);
      opacity: 0.55;
      transition: opacity 0.8s ease;
    }

    .city.is-arrived {
      opacity: 0.95;
    }

    .dunes {
      position: absolute;
      inset: auto 0 20% 0;
      height: 45%;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.25), transparent 55%),
        radial-gradient(circle at 80% 30%, rgba(255, 255, 255, 0.18), transparent 60%),
        linear-gradient(180deg, rgba(228, 169, 81, 0.7), rgba(168, 104, 40, 0.95));
    }

    .heat {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0px, rgba(255, 255, 255, 0.05) 2px, transparent 2px, transparent 8px);
      opacity: 0.3;
      animation: shimmer 6s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }

    .label {
      position: absolute;
      top: 12%;
      font-size: clamp(0.6rem, 1.5vw, 0.85rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(6, 10, 17, 0.6);
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(255, 255, 255, 0.2);
      z-index: 3;
      transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    }

    .label.left  { left: 4%; }
    .label.right { right: 4%; }

    .label.right.is-arrived {
      background: rgba(255, 233, 169, 0.25);
      border-color: rgba(255, 233, 169, 0.7);
      box-shadow: 0 0 16px rgba(255, 233, 169, 0.4);
    }

    .speech-bubble {
      position: absolute;
      top: 6%;
      left: 50%;
      transform: translateX(-50%) scale(0);
      background: rgba(255, 255, 255, 0.95);
      border-radius: 14px;
      padding: 8px 14px;
      font-size: clamp(0.7rem, 1.8vw, 0.82rem);
      font-weight: 700;
      color: #2a1c11;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      z-index: 20;
      opacity: 0;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
      text-align: center;
      max-width: 80%;
      pointer-events: none;
    }

    .speech-bubble::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: rgba(255, 255, 255, 0.95);
    }

    .speech-bubble.is-visible {
      transform: translateX(-50%) scale(1);
      opacity: 1;
    }

    .dust-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 30%;
      pointer-events: none;
      z-index: 8;
      overflow: hidden;
    }

    .dust {
      position: absolute;
      width: 6px;
      height: 6px;
      background: rgba(210, 175, 120, 0.7);
      border-radius: 50%;
      opacity: 0;
    }

    .dust.is-active {
      animation: dustRise 1.8s ease-out forwards;
    }

    @keyframes dustRise {
      0%   { opacity: 0.8; transform: translateY(0) translateX(0) scale(1); }
      100% { opacity: 0; transform: translateY(-40px) translateX(20px) scale(2.5); }
    }

    .confetti-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 25;
      overflow: hidden;
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      opacity: 0;
    }

    .confetti.is-active {
      animation: confettiFall 2.4s ease-out forwards;
    }

    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translateY(280px) rotate(720deg) scale(0.2); }
    }

    .milestone {
      position: absolute;
      bottom: 14%;
      width: 22px;
      height: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 6;
      opacity: 0.3;
      transition: opacity 0.6s ease, transform 0.4s ease;
    }

    .milestone.is-passed {
      opacity: 1;
      transform: scale(1.15);
    }

    .milestone-post {
      width: 5px;
      height: 18px;
      background: #7a5c3a;
      border-radius: 3px;
    }

    .milestone-sign {
      width: 22px;
      height: 15px;
      background: #c4a36e;
      border-radius: 3px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      font-size: 0.5rem;
      font-weight: 800;
      color: #4a321a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .milestone:nth-child(1) { left: 30%; }
    .milestone:nth-child(2) { left: 55%; }
    .milestone:nth-child(3) { left: 78%; }

    .caravan {
      --journey-progress: 0%;
      position: absolute;
      bottom: 4%;
      left: 4%;
      display: flex;
      justify-content: flex-start;
      align-items: flex-end;
      gap: 6px;
      flex-wrap: nowrap;
      transform: translateX(var(--journey-progress)) scale(0.6);
      transform-origin: bottom center;
      transition: transform 1s cubic-bezier(0.45, 0.05, 0.2, 0.95);
      z-index: 10;
    }

    .traveler {
      width: 68px;
      height: 140px;
      position: relative;
      animation: forwardSteps 3.2s ease-in-out infinite alternate;
    }

    .traveler:nth-child(odd)  { animation-delay: calc(var(--n) * 0.2s); }
    .traveler:nth-child(even) { animation-delay: calc(var(--n) * 0.2s + 0.1s); }

    @keyframes forwardSteps {
      0%   { transform: translateX(0) translateY(0); }
      33%  { transform: translateX(5px) translateY(-2px); }
      66%  { transform: translateX(10px) translateY(0); }
      100% { transform: translateX(16px) translateY(-1px); }
    }

    .traveler .head {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #f5cba5;
      position: absolute;
      top: 6px;
      left: 18px;
      border: 2px solid rgba(0, 0, 0, 0.08);
      box-shadow: inset 0 -3px 0 rgba(180, 120, 80, 0.2);
    }

    .traveler .t-eye {
      position: absolute;
      width: 5px;
      height: 6px;
      border-radius: 50%;
      background: #2e1b11;
      top: 13px;
    }

    .traveler .t-eye.left  { left: 8px; }
    .traveler .t-eye.right { right: 8px; }

    .traveler .t-eye::after {
      content: "";
      position: absolute;
      top: 1px;
      right: 1px;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
    }

    .traveler .t-smile {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 5px;
      border: 2px solid rgba(140, 80, 50, 0.6);
      border-top: none;
      border-radius: 0 0 10px 10px;
    }

    .traveler .headwrap {
      position: absolute;
      top: 2px;
      left: 15px;
      width: 40px;
      height: 18px;
      border-radius: 20px 20px 4px 4px;
      background: var(--wrap, rgba(255, 255, 255, 0.3));
      z-index: -1;
    }

    .traveler .body {
      width: 44px;
      height: 78px;
      position: absolute;
      top: 34px;
      left: 12px;
      border-radius: 20px 40px 18px 36px;
      background: linear-gradient(180deg, var(--robe-top), var(--robe-bottom));
    }

    .traveler .arm {
      position: absolute;
      width: 10px;
      height: 36px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.3), rgba(0, 0, 0, 0.1));
      border-radius: 12px;
      top: 16px;
      animation: armSwing 1.2s ease-in-out infinite alternate;
    }

    .arm.back  { left: -2px; transform: rotate(-18deg); animation-delay: 0s; }
    .arm.front { right: -2px; transform: rotate(18deg); animation-delay: 0.6s; }

    @keyframes armSwing {
      0%   { transform: rotate(-12deg); }
      100% { transform: rotate(12deg); }
    }

    .traveler .leg {
      position: absolute;
      bottom: 0;
      width: 12px;
      height: 48px;
      border-radius: 6px;
      background: linear-gradient(180deg, var(--leg-top), var(--leg-bottom));
      transform-origin: top center;
      animation: stride 0.9s ease-in-out infinite;
    }

    .leg.back  { left: 8px;  animation-delay: 0s; }
    .leg.front { right: 20px; animation-delay: 0.45s; }

    @keyframes stride {
      0%   { transform: rotate(6deg); }
      50%  { transform: rotate(-6deg); }
      100% { transform: rotate(6deg); }
    }

    .traveler .foot {
      position: absolute;
      bottom: -6px;
      width: 24px;
      height: 8px;
      border-radius: 8px;
      background: #4b3c2b;
      left: 50%;
      transform: translateX(-52%);
    }

    .donkey {
      width: 120px;
      height: 120px;
      position: relative;
      transform-origin: bottom center;
    }

    .donkey.flip { transform: scaleX(-1); }

    .donkey-body {
      width: 110px;
      height: 70px;
      border-radius: 50px;
      background: var(--coat, #9fa0a2);
      position: absolute;
      bottom: 32px;
      left: 5px;
    }

    .donkey-neck {
      width: 22px;
      height: 50px;
      border-radius: 12px;
      background: var(--coat, #9fa0a2);
      position: absolute;
      bottom: 78px;
      left: var(--neck-left, 12px);
    }

    .donkey-head {
      width: 55px;
      height: 48px;
      border-radius: 40px;
      background: var(--coat, #9fa0a2);
      position: absolute;
      bottom: 102px;
      left: var(--head-left, -6px);
    }

    .donkey-ear {
      width: 16px;
      height: 32px;
      border-radius: 50% 50% 10px 10px;
      background: var(--ear, #c4c5c7);
      position: absolute;
      top: -22px;
      transition: transform 0.3s ease;
      animation: earTwitch 4s ease-in-out infinite;
    }

    .donkey-ear.left  { left: 4px; animation-delay: 0.5s; }
    .donkey-ear.right { right: 4px; }

    @keyframes earTwitch {
      0%, 85%, 100% { transform: rotate(0deg); }
      90%           { transform: rotate(-8deg); }
      95%           { transform: rotate(5deg); }
    }

    .donkey-eye {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2e1b11;
      position: absolute;
      top: 16px;
      left: 24px;
    }

    .donkey-eye::after {
      content: "";
      position: absolute;
      top: 2px;
      right: 2px;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.55);
    }

    .donkey-leg {
      width: 14px;
      height: 46px;
      border-radius: 6px;
      background: var(--coat, #9fa0a2);
      position: absolute;
      bottom: 0;
      animation: stride 1.1s ease-in-out infinite;
    }

    .donkey-leg::after {
      content: "";
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 14px;
      height: 10px;
      border-radius: 4px;
      background: #4b3c2b;
    }

    .donkey-leg.one   { left: 16px; animation-delay: 0s; }
    .donkey-leg.two   { left: 36px; animation-delay: 0.3s; }
    .donkey-leg.three { right: 36px; animation-delay: 0.55s; }
    .donkey-leg.four  { right: 16px; animation-delay: 0.8s; }

    .donkey-pack {
      position: absolute;
      top: -6px;
      left: 28px;
      width: 52px;
      height: 26px;
      border-radius: 8px;
      background: linear-gradient(180deg, #8b6e4f, #6b4f33);
      border: 2px solid rgba(0, 0, 0, 0.15);
    }

    .donkey-pack::before {
      content: "";
      position: absolute;
      top: 4px;
      left: 6px;
      right: 6px;
      height: 3px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
    }

    .progress-hints {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .progress-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(247, 214, 133, 0.5);
      background: transparent;
      transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    }

    .progress-dot.active {
      background: var(--clr-gold);
      border-color: var(--clr-gold);
      box-shadow: 0 0 8px rgba(255, 233, 169, 0.6);
    }

    .controls {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 12px 14px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .instructions {
      margin: 0;
      color: #f5e4c5;
      font-size: clamp(0.8rem, 2vw, 0.92rem);
      font-weight: 600;
      transition: background 0.4s ease, color 0.4s ease;
      min-height: 22px;
      line-height: 1.4;
    }

    .instructions.is-done {
      color: #a5d6a7;
    }

    .step-counter {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--clr-gold-dark);
      opacity: 0.7;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .step-btn {
      flex: 1;
      max-width: 260px;
      border: none;
      border-radius: var(--radius-pill);
      padding: 11px 22px;
      font-family: var(--font-main);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--clr-sky-dark);
      background: linear-gradient(90deg, #ffe9a9, #ffc857);
      transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.3s ease;
      box-shadow: 0 4px 14px rgba(255, 200, 87, 0.35);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .step-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(255, 200, 87, 0.55);
    }

    .step-btn:active:not(:disabled) {
      transform: scale(0.97) translateY(0);
      box-shadow: 0 2px 8px rgba(255, 200, 87, 0.3);
    }

    .step-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }

    .step-btn:focus-visible {
      outline: 3px solid var(--clr-gold);
      outline-offset: 3px;
    }

    .reset-btn {
      border: none;
      border-radius: var(--radius-pill);
      padding: 11px 18px;
      font-family: var(--font-main);
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(90deg, #a8e6cf 0%, #55c89b 100%);
      color: #1b5e3a;
      transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.3s ease;
      box-shadow: 0 4px 14px rgba(85, 200, 155, 0.3);
      opacity: 0;
      pointer-events: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .reset-btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(85, 200, 155, 0.5); }
    .reset-btn:active { transform: scale(0.97); }
    .reset-btn:focus-visible { outline: 3px solid #55c89b; outline-offset: 3px; }

    .reset-btn.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .tip {
      text-align: center;
      color: rgba(217, 225, 255, 0.5);
      font-size: 0.8rem;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      body { padding: 8px; }
      .scene { width: 100%; padding: 12px; gap: 10px; border-radius: 16px; }
      .desert { min-height: 160px; max-height: 220px; border-radius: 14px; }
      .sun { width: 45px; height: 45px; }
      .cloud { width: 55px; height: 18px; }
      .cloud::before, .cloud::after { width: 32px; height: 18px; top: -6px; }
      .cloud::before { left: -12px; }
      .cloud::after { right: -12px; }
      .city { width: 120px; height: 48px; }
      .caravan { gap: 4px; transform: translateX(var(--journey-progress)) scale(0.42); }
      .milestone { display: none; }
      .buttons { flex-direction: column; align-items: center; }
      .step-btn, .reset-btn { width: 100%; max-width: 100%; }
      .speech-bubble { font-size: 0.7rem; padding: 6px 10px; border-radius: 10px; }
    }

    @media (max-width: 420px) {
      .scene { padding: 10px; gap: 8px; }
      header h1 { font-size: 1.1rem; }
      .caravan { left: 2%; transform: translateX(var(--journey-progress)) scale(0.36); }
      .desert { min-height: 140px; max-height: 190px; }
    }

    @media (min-height: 800px) {
      .desert { max-height: 380px; }
    }
  </style>
</head>
<body>

  <script>
    class LevelFourGame {
      static CONFIG = {
        maxSteps: 3,
        stepDistance: 26,
        animCooldown: 1000,
        messages: [
          "Press Space or tap the button to take each step toward Jerusalem.",
          "The road stretches on through rolling hills\u2026 \uD83C\uDFDC\uFE0F",
          "Almost there — the walls of Jerusalem appear on the horizon! \u2728",
          "You made it to Jerusalem for Passover! \uD83C\uDF89"
        ],
        speeches: [
          "",
          "The journey begins — onward!",
          "The city draws near\u2026",
          "We have arrived! \uD83C\uDFDB\uFE0F"
        ],
        dustCount: 18,
        confettiCount: 55,
        confettiColors: ["#ffd700", "#ff6b6b", "#48dbfb", "#ff9ff3", "#54a0ff", "#feca57", "#fff", "#a8e6cf"]
      };

      constructor() {
        this.els = {
          caravan:      document.querySelector("[data-caravan]"),
          stepBtn:      document.querySelector("[data-step-btn]"),
          resetBtn:     document.querySelector("[data-reset-btn]"),
          message:      document.querySelector("[data-message]"),
          speech:       document.querySelector("[data-speech]"),
          dots:         document.querySelectorAll(".progress-dot"),
          progressFill: document.querySelector("[data-progress]"),
          progressBar:  document.querySelector(".progress-track"),
          stepCounter:  document.querySelector("[data-step-counter]"),
          milestones:   document.querySelectorAll("[data-milestone]"),
          city:         document.querySelector("[data-city]"),
          jLabel:       document.querySelector("[data-jlabel]"),
          dustContainer:     document.querySelector("[data-dust]"),
          confettiContainer: document.querySelector("[data-confetti]"),
        };

        this.step = 0;
        this.isAnimating = false;

        this.#bindEvents();
        this.#render();
      }

      #bindEvents() {
        this.els.stepBtn.addEventListener("click", () => this.#handleStep());
        this.els.resetBtn.addEventListener("click", () => this.#reset());

        document.addEventListener("keydown", (e) => {
          if (e.code === "Space" || e.key === "Enter") {
            e.preventDefault();
            if (this.step >= LevelFourGame.CONFIG.maxSteps) {
              this.#reset();
            } else {
              this.#handleStep();
            }
          }
        });
      }

      #handleStep() {
        const { maxSteps, animCooldown } = LevelFourGame.CONFIG;
        if (this.step >= maxSteps || this.isAnimating) return;

        this.isAnimating = true;
        this.step++;

        this.#spawnDust();
        this.#render();
        this.#showSpeech(LevelFourGame.CONFIG.speeches[this.step]);

        const milestone = document.querySelector(`[data-milestone="${this.step}"]`);
        if (milestone) milestone.classList.add("is-passed");

        if (this.step >= maxSteps) {
          this.els.stepBtn.disabled = true;
          this.els.stepBtn.textContent = "\uD83C\uDFDB\uFE0F Arrived!";
          this.els.message.classList.add("is-done");
          this.els.resetBtn.classList.add("is-visible");
          this.els.city.classList.add("is-arrived");
          this.els.jLabel.classList.add("is-arrived");

          setTimeout(() => this.#spawnConfetti(), 500);

          /* ── Chapter transition trigger ── */
          if (typeof chapterComplete === 'function') {
            chapterComplete();
          }
        }

        setTimeout(() => { this.isAnimating = false; }, animCooldown);
      }

      #render() {
        const { maxSteps, stepDistance, messages } = LevelFourGame.CONFIG;

        this.els.caravan.style.setProperty("--journey-progress", `${this.step * stepDistance}%`);

        this.els.dots.forEach((dot, i) => {
          dot.classList.toggle("active", i < this.step);
        });

        const pct = (this.step / maxSteps) * 100;
        this.els.progressFill.style.width = `${pct}%`;
        this.els.progressBar.setAttribute("aria-valuenow", this.step);

        this.els.message.textContent = messages[this.step];
        this.els.stepCounter.textContent = `Step ${this.step} of ${maxSteps}`;
      }

      #showSpeech(text) {
        if (!text) return;
        this.els.speech.textContent = text;
        this.els.speech.classList.add("is-visible");
        setTimeout(() => this.els.speech.classList.remove("is-visible"), 3000);
      }

      #spawnDust() {
        const { dustCount } = LevelFourGame.CONFIG;
        const container = this.els.dustContainer;

        for (let i = 0; i < dustCount; i++) {
          const p = document.createElement("div");
          p.classList.add("dust");
          p.style.left = `${10 + Math.random() * 40}%`;
          p.style.bottom = `${Math.random() * 15}%`;
          p.style.animationDelay = `${Math.random() * 0.6}s`;
          const size = `${4 + Math.random() * 6}px`;
          p.style.width = size;
          p.style.height = size;

          container.appendChild(p);
          requestAnimationFrame(() => p.classList.add("is-active"));
        }

        setTimeout(() => { container.innerHTML = ""; }, 3000);
      }

      #spawnConfetti() {
        const { confettiCount, confettiColors } = LevelFourGame.CONFIG;
        const container = this.els.confettiContainer;

        for (let i = 0; i < confettiCount; i++) {
          const piece = document.createElement("div");
          piece.classList.add("confetti");
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.top = `${Math.random() * 25}%`;
          piece.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
          piece.style.animationDelay = `${Math.random() * 0.9}s`;
          const size = `${5 + Math.random() * 8}px`;
          piece.style.width = size;
          piece.style.height = size;

          container.appendChild(piece);
          requestAnimationFrame(() => piece.classList.add("is-active"));
        }

        setTimeout(() => { container.innerHTML = ""; }, 4500);
      }

      #reset() {
        this.step = 0;
        this.isAnimating = false;

        this.els.caravan.style.setProperty("--journey-progress", "0%");
        this.els.dots.forEach(d => d.classList.remove("active"));
        this.els.milestones.forEach(m => m.classList.remove("is-passed"));
        this.els.city.classList.remove("is-arrived");
        this.els.jLabel.classList.remove("is-arrived");

        this.els.stepBtn.disabled = false;
        this.els.stepBtn.textContent = "\uD83D\uDEB6 Take a Step";
        this.els.resetBtn.classList.remove("is-visible");
        this.els.message.classList.remove("is-done");
        this.els.speech.classList.remove("is-visible");
        this.els.dustContainer.innerHTML = "";
        this.els.confettiContainer.innerHTML = "";

        /* ── Allow chapter transition to fire again ── */
        chapterTriggered = false;

        this.#render();
        this.els.stepBtn.focus();
      }
    }

    document.addEventListener("DOMContentLoaded", () => new LevelFourGame());
  </script>

  <!-- ═══ CHAPTER TRANSITION OVERLAY ═══ -->

    font-family:'Nunito',sans-serif;
  ">

      box-shadow:0 20px 60px rgba(0,0,0,.3);
      max-width:88vw; width:360px;
      transform:scale(.8);
      transition:transform .5s cubic-bezier(.34,1.56,.64,1);
    ">
      <h2 id="ovTitle" style="font-size:clamp(1.15rem,3.5vw,1.5rem);color:#5c3b1a;margin:0 0 8px;"></h2>
      <p id="ovDone" style="color:#8a5a21;font-size:.9rem;margin:0 0 6px;line-height:1.4;"></p>
      <p id="ovNext" style="color:#9c6c32;font-size:.82rem;font-weight:600;margin:0 0 18px;"></p>
      <button id="ovBtn" style="
        border:none; border-radius:999px;
        background:linear-gradient(90deg,#a8e6cf,#55c89b);
        color:#1b5e3a; font-family:'Nunito',sans-serif;
        font-size:1rem; font-weight:700;
        padding:12px 28px; cursor:pointer;
        box-shadow:0 4px 14px rgba(85,200,155,.3);
        transition:transform .15s,box-shadow .2s;
      " onmouseover="this.style.transform='translateY(-2px)'"
         onmouseout="this.style.transform='none'"
      >Continue →</button>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════════
    // ★ LEVEL 4 SETTINGS
    // ════════════════════════════════════════════
    const THIS_CHAPTER   = 4;
    const CHAPTER_DONE   = "Jesus and his family traveled through the desert and arrived safely in Jerusalem for Passover!";
    const NEXT_FILE      = "indexjesus5.html";
    // ════════════════════════════════════════════

    const CHAPTER_TITLES = [
      "",
      "Gabriel Visits Mary",
      "Journey to Bethlehem",
      "No Room at the Inn",
      "Jesus Is Born",
      "Missing Jesus",
      "Back to Jerusalem",
      "Baptism in the Jordan",
      "Temptation in the Desert",
      "Jesus Begins His Ministry",
      "First Miracle at Cana"
    ];

    let chapterTriggered = false;

    function chapterComplete() {
      if (chapterTriggered) return;
      chapterTriggered = true;

      const ov   = document.getElementById('chapterOverlay');
      const card = document.getElementById('chapterCard');
      const nextChapter = THIS_CHAPTER + 1;
      const isLast = !NEXT_FILE;

      document.getElementById('ovTitle').textContent = isLast
        ? '🌟 The Christmas Story Complete!'
        : `✨ Chapter ${THIS_CHAPTER} Complete!`;

      document.getElementById('ovDone').textContent = CHAPTER_DONE;

      document.getElementById('ovNext').textContent = isLast
        ? 'You journeyed through the whole Christmas Story! 🎄'
        : `Next: Chapter ${nextChapter} — ${CHAPTER_TITLES[nextChapter] || ''}`;

      const btn = document.getElementById('ovBtn');
      btn.textContent = isLast ? '🔄 Play Again' : 'Continue →';
      btn.onclick = () => {
        window.location.href = isLast ? 'indexjesus1.html' : NEXT_FILE;
      };

      setTimeout(() => {
        ov.style.opacity = '1';
        ov.style.pointerEvents = 'auto';
        card.style.transform = 'scale(1)';
      }, 1800);
    }
  </script>
